<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>압구정 조망 V57 Geometry 시험</title><style>html,body,#app{width:100%;height:100%;margin:0;overflow:hidden;background:#eef2f5}#app{border:0;display:block}</style></head><body><iframe id="app" title="압구정 조망 시뮬레이션" src="./index_v55_zone_cache_light.html?v=20260711-55"></iframe><script>const code="\n(()=>{\n if(window.__APG_V57_GEOMETRY__)return;window.__APG_V57_GEOMETRY__=true;\n const S={on:true,target:null,wall:null,roof:null,bottom:null,edges:null,originalShow:null};\n const css=document.createElement(\"style\");\n css.textContent=\"#geo57{position:fixed;z-index:99999;right:14px;top:14px;width:252px;padding:12px;border:1px solid #9aa4ad;border-radius:12px;background:rgba(24,31,39,.95);box-shadow:0 9px 28px rgba(0,0,0,.28);font:12px Arial,'Malgun Gothic',sans-serif;color:#fff}#geo57 b{display:block;font-size:14px;color:#eef2f5;margin-bottom:8px}#geo57 .row{display:grid;grid-template-columns:1fr 1fr;gap:6px}#geo57 button{padding:8px 5px;border:1px solid #77828d;border-radius:8px;background:#35404a;color:#eef2f5;font-weight:700;cursor:pointer}#geo57 button.on{background:#d8dde1;color:#17202a;border-color:#fff}#geo57 small{display:block;color:#cbd5e1;line-height:1.45;margin-top:8px}#geo57 em{display:block;color:#9ed5e8;font-style:normal;margin-top:6px}\";\n document.head.appendChild(css);\n const box=document.createElement(\"div\");box.id=\"geo57\";\n box.innerHTML='<b>V57 알루미늄 Geometry 시험</b><div class=\"row\"><button id=\"gBase\">원본</button><button id=\"gModel\" class=\"on\">Geometry</button></div><button id=\"gFocus\" style=\"width:100%;margin-top:6px\">대상 확대</button><small>대표 유닛 한 개만 저수준 벽·지붕 메시로 교체합니다.</small><em id=\"gTarget\">대상 유닛을 찾는 중…</em>';\n document.body.appendChild(box);\n const baseBtn=box.querySelector(\"#gBase\"),modelBtn=box.querySelector(\"#gModel\"),focusBtn=box.querySelector(\"#gFocus\"),targetEl=box.querySelector(\"#gTarget\");\n\n function val(p,t){return p&&typeof p.getValue===\"function\"?p.getValue(t):p;}\n function panelTexture(){\n  const c=document.createElement(\"canvas\");c.width=128;c.height=128;const x=c.getContext(\"2d\");\n  const grad=x.createLinearGradient(0,0,128,0);grad.addColorStop(0,\"#8e979e\");grad.addColorStop(.18,\"#d5dade\");grad.addColorStop(.5,\"#b6bec4\");grad.addColorStop(.82,\"#e4e7e9\");grad.addColorStop(1,\"#9099a0\");\n  x.fillStyle=grad;x.fillRect(0,0,128,128);\n  x.strokeStyle=\"rgba(55,65,73,.65)\";x.lineWidth=2;\n  for(let i=0;i<=128;i+=32){x.beginPath();x.moveTo(i,0);x.lineTo(i,128);x.stroke();}\n  x.strokeStyle=\"rgba(48,58,66,.72)\";x.lineWidth=3;\n  x.beginPath();x.moveTo(0,2);x.lineTo(128,2);x.stroke();\n  x.beginPath();x.moveTo(0,126);x.lineTo(128,126);x.stroke();\n  x.fillStyle=\"rgba(255,255,255,.22)\";x.fillRect(3,4,3,120);x.fillRect(67,4,2,120);\n  return c.toDataURL(\"image/png\");\n }\n function choose(){\n  if(typeof unitsDataSource===\"undefined\"||!unitsDataSource)return null;\n  const now=Cesium.JulianDate.now();\n  const list=unitsDataSource.entities.values.filter(e=>e.polygon&&val(e.polygon.hierarchy,now)?.positions?.length>=3);\n  list.sort((a,b)=>(Number(val(b.polygon.extrudedHeight,now))||0)-(Number(val(a.polygon.extrudedHeight,now))||0));\n  return list[0]||null;\n }\n function build(){\n  if(S.wall||!window.Cesium)return;\n  const e=choose();if(!e)return;\n  const now=Cesium.JulianDate.now(),h=val(e.polygon.hierarchy,now),raw=h.positions;\n  const top=Number(val(e.polygon.extrudedHeight,now))||100;\n  const bottom=Number(val(e.polygon.height,now))||0;\n  const wallPos=[],mins=[],maxs=[],roofPos=[];\n  for(const p of raw){\n   const cg=Cesium.Cartographic.fromCartesian(p);\n   wallPos.push(Cesium.Cartesian3.fromRadians(cg.longitude,cg.latitude,bottom));\n   mins.push(bottom);maxs.push(top);\n   roofPos.push(Cesium.Cartesian3.fromRadians(cg.longitude,cg.latitude,top));\n  }\n  wallPos.push(Cesium.Cartesian3.clone(wallPos[0]));mins.push(bottom);maxs.push(top);\n  const wallGeometry=new Cesium.WallGeometry({\n   positions:wallPos,minimumHeights:mins,maximumHeights:maxs,\n   vertexFormat:Cesium.MaterialAppearance.MaterialSupport.TEXTURED.vertexFormat\n  });\n  const estimatedFloors=Math.max(1,Math.round((top-bottom)/3.3));\n  const originalUnitColor=(e.baseColor&&Cesium.Color.clone(e.baseColor))||Cesium.Color.LIGHTGRAY;\n  const wallTint=Cesium.Color.lerp(Cesium.Color.WHITE,originalUnitColor,.20,new Cesium.Color());\n  wallTint.alpha=1;\n  const material=Cesium.Material.fromType(\"Image\",{\n   image:panelTexture(),repeat:new Cesium.Cartesian2(Math.max(4,raw.length*2),estimatedFloors),\n   color:wallTint\n  });\n  S.wall=viewer.scene.primitives.add(new Cesium.Primitive({\n   geometryInstances:new Cesium.GeometryInstance({geometry:wallGeometry,id:e}),\n   appearance:new Cesium.MaterialAppearance({\n    material,materialSupport:Cesium.MaterialAppearance.MaterialSupport.TEXTURED,\n    translucent:false,closed:false,faceForward:true,\n    renderState:{\n     cull:{enabled:false},\n     depthTest:{enabled:true},\n     depthMask:true,\n     blending:{enabled:false}\n    }\n   }),\n   asynchronous:false\n  }));\n  const roofGeometry=Cesium.PolygonGeometry.fromPositions({\n   positions:roofPos,perPositionHeight:true,\n   vertexFormat:Cesium.PerInstanceColorAppearance.VERTEX_FORMAT\n  });\n  S.roof=viewer.scene.primitives.add(new Cesium.Primitive({\n   geometryInstances:new Cesium.GeometryInstance({\n    geometry:roofGeometry,id:e,\n    attributes:{color:Cesium.ColorGeometryInstanceAttribute.fromColor(e.baseColor||Cesium.Color.LIGHTGRAY)}\n   }),\n   appearance:new Cesium.PerInstanceColorAppearance({translucent:false,closed:true,flat:false}),\n   asynchronous:false\n  }));\n  const bottomPos=[];\n  for(const p of raw){\n   const cg=Cesium.Cartographic.fromCartesian(p);\n   bottomPos.push(Cesium.Cartesian3.fromRadians(cg.longitude,cg.latitude,bottom));\n  }\n  const bottomGeometry=Cesium.PolygonGeometry.fromPositions({\n   positions:bottomPos,perPositionHeight:true,\n   vertexFormat:Cesium.PerInstanceColorAppearance.VERTEX_FORMAT\n  });\n  S.bottom=viewer.scene.primitives.add(new Cesium.Primitive({\n   geometryInstances:new Cesium.GeometryInstance({\n    geometry:bottomGeometry,id:e,\n    attributes:{color:Cesium.ColorGeometryInstanceAttribute.fromColor(Cesium.Color.fromCssColorString(\"#747d84\"))}\n   }),\n   appearance:new Cesium.PerInstanceColorAppearance({translucent:false,closed:true,flat:true}),\n   asynchronous:false\n  }));\n  S.edges=viewer.scene.primitives.add(new Cesium.PolylineCollection());\n  const edgeColor=Cesium.Color.fromCssColorString(\"#39434c\").withAlpha(.95);\n  const topLoop=roofPos.concat([roofPos[0]]),bottomLoop=wallPos;\n  S.edges.add({positions:topLoop,width:1.5,material:Cesium.Material.fromType(\"Color\",{color:edgeColor})});\n  S.edges.add({positions:bottomLoop,width:1.2,material:Cesium.Material.fromType(\"Color\",{color:edgeColor})});\n  for(let i=0;i<raw.length;i++)S.edges.add({positions:[wallPos[i],roofPos[i]],width:1.1,material:Cesium.Material.fromType(\"Color\",{color:edgeColor})});\n  S.target=e;S.originalShow=val(e.polygon.show,now);targetEl.textContent=\"시험 대상: \"+(e.name||e.id||\"대표 유닛\")+\" · 추정 \"+estimatedFloors+\"층\";\n  apply();\n }\n function apply(){\n  if(!S.target)return;\n  S.target.polygon.show=!S.on;\n  if(S.wall)S.wall.show=S.on;if(S.roof)S.roof.show=S.on;if(S.bottom)S.bottom.show=S.on;if(S.edges)S.edges.show=S.on;\n  baseBtn.classList.toggle(\"on\",!S.on);modelBtn.classList.toggle(\"on\",S.on);\n  viewer.scene.requestRender();\n }\n function focus(){if(!S.target)return;const was=S.on;S.target.polygon.show=true;viewer.flyTo(S.target,{duration:1.2,offset:new Cesium.HeadingPitchRange(0,-.55,420)}).then(()=>{S.target.polygon.show=!was;});}\n baseBtn.onclick=()=>{S.on=false;apply();};\n modelBtn.onclick=()=>{S.on=true;apply();};\n focusBtn.onclick=focus;\n const wait=function enhanceSightLasers(){\n  if(!window.Cesium||typeof selectedSightEntities===\"undefined\")return;\n  for(const line of selectedSightEntities){\n   if(!line||line.__geo57Laser||!line.polyline)continue;\n   const name=String(line.name||\"\");\n   if(!name.includes(\"층 조망각\"))continue;\n   line.__geo57Laser=true;\n   line.polyline.width=7;\n   line.polyline.material=new Cesium.PolylineGlowMaterialProperty({\n    color:Cesium.Color.fromCssColorString(\"#bff7ff\").withAlpha(.98),\n    glowPower:.24,\n    taperPower:.82\n   });\n   line.polyline.depthFailMaterial=new Cesium.PolylineGlowMaterialProperty({\n    color:Cesium.Color.fromCssColorString(\"#42d9ff\").withAlpha(.72),\n    glowPower:.34,\n    taperPower:.72\n   });\n  }\n  if(typeof viewer!==\"undefined\"&&viewer.scene)viewer.scene.requestRender();\n }\n const laserWatch=setInterval(enhanceSightLasers,220);\n setInterval(()=>{if(!window.Cesium||typeof viewer===\"undefined\"||typeof unitsDataSource===\"undefined\"||!unitsDataSource)return;build();enhanceSightLasers();if(S.target)clearInterval(wait);},300);\n})();";const frame=document.getElementById("app");frame.addEventListener("load",()=>{const inject=()=>{try{const d=frame.contentDocument;if(!d||!d.body||!d.querySelector("#cesiumContainer"))return setTimeout(inject,250);if(d.getElementById("geo57"))return;const s=d.createElement("script");s.textContent=code;d.body.appendChild(s);}catch(e){console.error("V57 geometry injection failed",e);}};setTimeout(inject,300);});</script></body></html>
