name: Calculate zone 2 layout comparisons

on:
  push:
    branches:
      - analysis/uniform-view-compare
    paths:
      - tools/calc_uniform_compare.js
      - tools/run_uniform_compare_v2.js
      - tools/run_view_preserving_compare.js
      - tools/run_conservative_grade_by_unit_type.js
      - .github/workflows/calc-uniform-view-compare.yml

permissions:
  contents: write

jobs:
  calculate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: analysis/uniform-view-compare
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run uniform comparison and conservative grade report
        run: node tools/run_uniform_compare_v2.js

      - name: Run view-preserving comparison
        run: node tools/run_view_preserving_compare.js

      - name: Commit results to analysis branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add analysis_results/zone2_uniform_view_compare.json analysis_results/apgujeong_2_units_uniform.geojson
          git add analysis_results/zone2_view_preserving_compare.json analysis_results/apgujeong_2_units_view_preserving.geojson
          git add analysis_results/conservative_grade_by_zone_unit_type.json analysis_results/conservative_grade_by_zone_unit_type.csv
          if git diff --cached --quiet; then
            echo "No result changes"
          else
            git commit -m "Update layout comparisons and conservative grade report"
            git push origin HEAD:analysis/uniform-view-compare
          fi
