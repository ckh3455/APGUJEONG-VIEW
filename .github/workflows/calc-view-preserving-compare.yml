name: Calculate zone 2 view-preserving layout comparison

on:
  push:
    branches:
      - analysis/uniform-view-compare
    paths:
      - tools/run_view_preserving_compare.js
      - .github/workflows/calc-view-preserving-compare.yml

permissions:
  contents: write

jobs:
  calculate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: analysis/uniform-view-compare
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run view-preserving comparison
        run: node tools/run_view_preserving_compare.js

      - name: Commit comparison results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add analysis_results/zone2_view_preserving_compare.json analysis_results/apgujeong_2_units_view_preserving.geojson
          if git diff --cached --quiet; then
            echo "No result changes"
          else
            git commit -m "Add zone 2 view-preserving layout results"
            git push origin HEAD:analysis/uniform-view-compare
          fi
