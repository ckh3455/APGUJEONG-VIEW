name: Calculate future redevelopment handicap

on:
  push:
    branches:
      - calc-new-hangang-20260711
    paths:
      - calc_future_handicap.mjs
      - .github/workflows/calc-future-handicap.yml

permissions:
  contents: read

jobs:
  calculate:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Playwright
        run: |
          npm init -y
          npm install playwright@1.53.2
          npx playwright install --with-deps chromium

      - name: Start local server
        run: |
          python3 -m http.server 8000 > /tmp/apgujeong-http.log 2>&1 &
          sleep 3

      - name: Calculate future handicap
        run: node calc_future_handicap.mjs

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: future-handicap-results
          path: |
            future_handicap_result.json
            future_handicap_summary.csv
            future_handicap_reference_coefficients.csv
            future_handicap_distribution.csv
            future_handicap_detail.csv
