name: Calculate future redevelopment view handicap

on:
  push:
    branches:
      - calc-new-hangang-20260711
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  calculate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Checkout calculation branch
        uses: actions/checkout@v4
        with:
          ref: calc-new-hangang-20260711

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Playwright
        run: |
          npm init -y
          npm install playwright@1.53.2
          npx playwright install --with-deps chromium

      - name: Start local server
        run: |
          python3 -m http.server 8000 > /tmp/apgujeong-http.log 2>&1 &
          echo $! > /tmp/apgujeong-http.pid
          sleep 3

      - name: Calculate future handicap
        run: node calc_new_hangang_browser.mjs

      - name: Upload calculation results
        uses: actions/upload-artifact@v4
        with:
          name: future-redevelopment-handicap-results
          path: |
            future_handicap_view_results.json
            future_handicap_summary.csv
            future_handicap_coefficients.csv
            future_handicap_detail.csv

      - name: Commit calculation results
        if: github.event_name == 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add future_handicap_view_results.json future_handicap_summary.csv future_handicap_coefficients.csv future_handicap_detail.csv
          git commit -m "Add future redevelopment handicap results [skip calc]" || exit 0
          git push origin HEAD:calc-new-hangang-20260711
