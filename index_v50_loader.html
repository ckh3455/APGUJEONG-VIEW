<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>압구정 조망 시뮬레이션</title>
  <style>
    html, body { width: 100%; height: 100%; margin: 0; }
    body { display: grid; place-items: center; font-family: Arial, "Malgun Gothic", sans-serif; background: #f8fafc; color: #334155; }
    #bootMessage { padding: 18px 22px; border: 1px solid #dbe3ef; border-radius: 10px; background: #fff; box-shadow: 0 8px 24px rgba(15,23,42,.10); font-size: 14px; font-weight: 700; }
    #bootMessage.error { color: #b91c1c; white-space: pre-wrap; }
  </style>
</head>
<body>
  <div id="bootMessage">압구정 조망 시뮬레이션 v50을 불러오는 중입니다.</div>

  <script type="text/plain" id="updateRiverModeNotePatch">
    function updateRiverModeNote() {
      if (!riverModeNoteEl) return;
      if (currentZoneId === "ALL") {
        riverModeNoteEl.textContent = "구역 선택 대기 · 2~5구역 중 하나를 선택하면 해당 구역 전체 유닛을 계산합니다.";
        return;
      }
      riverModeNoteEl.textContent = riverModesReady
        ? `현재 구역 전체 계산 완료 · 보수적·완화적 저장 결과 · 현재 기준: ${activeRiverConfig().label}`
        : `현재 구역 전체 유닛 계산 중 · 보수적·완화적 동시 계산`;
    }
  </script>

  <script type="text/plain" id="resetCachePatch">
    function resetViewAnalysisCache() {
      viewAnalysisByFid.clear();
      calculatedZones.clear();
      calculatingZonePromises.clear();
      zoneCalculationQueue = Promise.resolve();
      viewAnalysisCacheByMode.clear();
      sharedCandidateDataByFid.clear();
    }
  </script>

  <script type="text/plain" id="candidatePatch">
    function optimizedCommonRiverContexts() {
      const contexts = [];
      const zoneIds = currentLoadedZoneIds();
      for (const mode of Object.keys(RIVER_MODE_CONFIGS)) {
        const state = preparedRiverStateByMode.get(mode) || preparedRiverState(mode, zoneIds);
        if (!state || !state.context || !state.context.segments || !state.context.segments.length) continue;
        contexts.push({ mode, context: state.context });
      }
      return contexts;
    }

    function optimizedCommonRiverPoints(contexts) {
      const points = [];
      const seen = new Set();
      for (const item of contexts || []) {
        for (const point of item.context.points || []) {
          const key = `${Math.round(point.x * 10)}:${Math.round(point.y * 10)}`;
          if (seen.has(key)) continue;
          seen.add(key);
          points.push(point);
        }
      }
      return points;
    }

    function optimizedAngularScan(origin, scanPoints, angleStep = 1) {
      const bearings = (scanPoints || [])
        .map(point => bearingTo(origin, point))
        .filter(value => Number.isFinite(value))
        .sort((a, b) => a - b);
      if (!bearings.length) return { angles: [], targetSpan: 0 };
      if (bearings.length === 1) {
        const angle = normalizeAngle(Math.round(bearings[0]));
        return { angles: [angle], targetSpan: 1 };
      }

      let largestGap = -1;
      let gapIndex = 0;
      for (let i = 0; i < bearings.length; i += 1) {
        const current = bearings[i];
        const next = bearings[(i + 1) % bearings.length] + (i === bearings.length - 1 ? 360 : 0);
        const gap = next - current;
        if (gap > largestGap) {
          largestGap = gap;
          gapIndex = i;
        }
      }

      const start = bearings[(gapIndex + 1) % bearings.length];
      const span = Math.max(0, 360 - largestGap);
      const step = Math.max(1, Number(angleStep) || 1);
      const angles = [];
      const seen = new Set();
      for (let offset = 0; offset <= span; offset += step) {
        const angle = normalizeAngle(Math.round(start + offset));
        if (seen.has(angle)) continue;
        seen.add(angle);
        angles.push(angle);
      }
      const finalAngle = normalizeAngle(Math.round(start + span));
      if (!seen.has(finalAngle)) angles.push(finalAngle);
      return { angles, targetSpan: Math.round(span) };
    }

    function segmentBounds(segments) {
      let minX = Number.POSITIVE_INFINITY;
      let minY = Number.POSITIVE_INFINITY;
      let maxX = Number.NEGATIVE_INFINITY;
      let maxY = Number.NEGATIVE_INFINITY;
      for (const segment of segments || []) {
        minX = Math.min(minX, segment.a.x, segment.b.x);
        minY = Math.min(minY, segment.a.y, segment.b.y);
        maxX = Math.max(maxX, segment.a.x, segment.b.x);
        maxY = Math.max(maxY, segment.a.y, segment.b.y);
      }
      if (!Number.isFinite(minX)) return null;
      return { minX, minY, maxX, maxY };
    }

    function buildFastBlockerIndex(allFootprints, cellSize = 80) {
      const groups = new Map();
      for (const footprint of allFootprints || []) {
        const key = footprint.groupKey || `${footprint.zoneName}:${footprint.dong || ""}`;
        let group = groups.get(key);
        if (!group) {
          group = {
            key,
            zoneName: footprint.zoneName,
            dong: footprint.dong,
            unitType: footprint.unitType,
            members: [],
            barrierSegments: footprint.groupBarrierSegments || footprint.segments || [],
            height: 0,
            floors: 0,
            bounds: null
          };
          groups.set(key, group);
        }
        group.members.push(footprint);
        group.height = Math.max(group.height, blockerOcclusionHeight(footprint));
        group.floors = Math.max(group.floors, blockerOcclusionFloors(footprint));
      }

      const grid = new Map();
      const put = (cx, cy, key) => {
        const cellKey = `${cx}:${cy}`;
        if (!grid.has(cellKey)) grid.set(cellKey, new Set());
        grid.get(cellKey).add(key);
      };

      for (const group of groups.values()) {
        group.bounds = segmentBounds(group.barrierSegments);
        if (!group.bounds) continue;
        const minCX = Math.floor(group.bounds.minX / cellSize);
        const maxCX = Math.floor(group.bounds.maxX / cellSize);
        const minCY = Math.floor(group.bounds.minY / cellSize);
        const maxCY = Math.floor(group.bounds.maxY / cellSize);
        for (let cx = minCX; cx <= maxCX; cx += 1) {
          for (let cy = minCY; cy <= maxCY; cy += 1) put(cx, cy, group.key);
        }
      }

      return { groups, grid, cellSize };
    }

    function candidateGroupKeysAlongRay(origin, bearing, maxDistance, blockerIndex) {
      const result = new Set();
      const { grid, cellSize } = blockerIndex;
      const rad = Cesium.Math.toRadians(bearing);
      const dx = Math.sin(rad);
      const dy = Math.cos(rad);
      let cx = Math.floor(origin.x / cellSize);
      let cy = Math.floor(origin.y / cellSize);
      const stepX = dx > 0 ? 1 : dx < 0 ? -1 : 0;
      const stepY = dy > 0 ? 1 : dy < 0 ? -1 : 0;
      const nextX = stepX > 0 ? (cx + 1) * cellSize : cx * cellSize;
      const nextY = stepY > 0 ? (cy + 1) * cellSize : cy * cellSize;
      let tMaxX = stepX === 0 ? Number.POSITIVE_INFINITY : (nextX - origin.x) / dx;
      let tMaxY = stepY === 0 ? Number.POSITIVE_INFINITY : (nextY - origin.y) / dy;
      const tDeltaX = stepX === 0 ? Number.POSITIVE_INFINITY : cellSize / Math.abs(dx);
      const tDeltaY = stepY === 0 ? Number.POSITIVE_INFINITY : cellSize / Math.abs(dy);
      let travelled = 0;
      let guard = 0;
      const maxGuard = Math.ceil(maxDistance / cellSize) * 4 + 20;

      while (travelled <= maxDistance && guard < maxGuard) {
        for (let ox = -1; ox <= 1; ox += 1) {
          for (let oy = -1; oy <= 1; oy += 1) {
            const entries = grid.get(`${cx + ox}:${cy + oy}`);
            if (!entries) continue;
            for (const key of entries) result.add(key);
          }
        }
        if (tMaxX < tMaxY) {
          cx += stepX;
          travelled = tMaxX;
          tMaxX += tDeltaX;
        } else {
          cy += stepY;
          travelled = tMaxY;
          tMaxY += tDeltaY;
        }
        guard += 1;
      }
      return result;
    }

    function nearestIntersectionDistance(origin, bearing, segments, maxDistance) {
      let nearest = Number.POSITIVE_INFINITY;
      for (const segment of segments || []) {
        const t = raySegmentDistance(origin, bearing, segment.a, segment.b);
        if (t === null || t <= SAME_DONG_INTERNAL_RAY_EPS_M || t >= maxDistance) continue;
        if (t < nearest) nearest = t;
      }
      return nearest;
    }

    function collectFastObstacleEvents(origin, bearing, maxDistance, sourceFootprint, blockerIndex) {
      let internalBlockDistance = nearestIntersectionDistance(
        origin,
        bearing,
        sourceFootprint.groupCoreBridgeSegments || [],
        maxDistance
      );

      const sourceGroup = blockerIndex.groups.get(sourceFootprint.groupKey);
      if (sourceGroup) {
        for (const member of sourceGroup.members) {
          if (String(member.fid) === String(sourceFootprint.fid)) continue;
          internalBlockDistance = Math.min(
            internalBlockDistance,
            nearestIntersectionDistance(origin, bearing, member.segments || [], maxDistance)
          );
        }
      }

      const hits = [];
      const candidateKeys = candidateGroupKeysAlongRay(origin, bearing, maxDistance, blockerIndex);
      for (const key of candidateKeys) {
        if (key === sourceFootprint.groupKey) continue;
        const group = blockerIndex.groups.get(key);
        if (!group) continue;
        const t = nearestIntersectionDistance(origin, bearing, group.barrierSegments, maxDistance);
        if (!Number.isFinite(t)) continue;
        hits.push({
          zoneName: group.zoneName,
          dong: group.dong,
          unitType: group.unitType,
          distance: t,
          height: group.height,
          floors: group.floors
        });
      }
      hits.sort((a, b) => a.distance - b.distance);
      return { internalBlockDistance, hits };
    }

    function blockerProfileFromFastEvents(obstacleEvents, maxDistance) {
      let maxBlockerHeight = 0;
      const blockers = [];
      for (const hit of obstacleEvents.hits || []) {
        if (hit.distance >= maxDistance) continue;
        if (hit.height > maxBlockerHeight) {
          maxBlockerHeight = hit.height;
          blockers.push(hit);
        }
      }
      return { maxBlockerHeight, blockers };
    }

    function yieldToBrowser() {
      return new Promise(resolve => setTimeout(resolve, 0));
    }

    async function collectSharedFacadeCandidatesAsync(
      footprint,
      contexts,
      blockerIndex,
      commonPoints,
      quality,
      progress,
      generation
    ) {
      const samples = sampleFacadeSegments(footprint, quality.sampleStep);
      const rays = [];
      let batchCount = 0;

      for (const sample of samples) {
        const scan = optimizedAngularScan(sample.point, commonPoints, quality.angleStep);
        for (const angle of scan.angles) {
          if (generation !== optimizedCalculationGeneration) return null;
          const hitsByMode = {};
          let maxDistance = 0;
          for (const item of contexts) {
            const hit = nearestRayHit(sample.point, angle, item.context.segments);
            if (!hit || !Number.isFinite(hit.distance) || hit.distance <= 2) continue;
            hitsByMode[item.mode] = hit.distance;
            maxDistance = Math.max(maxDistance, hit.distance);
          }

          if (maxDistance > 0) {
            const rad = Cesium.Math.toRadians(angle);
            const farTarget = {
              x: sample.point.x + Math.sin(rad) * maxDistance,
              y: sample.point.y + Math.cos(rad) * maxDistance
            };
            if (viewRayLeavesBuilding(sample.point, farTarget, footprint)) {
              const obstacleEvents = collectFastObstacleEvents(
                sample.point,
                angle,
                maxDistance,
                footprint,
                blockerIndex
              );
              rays.push({ angle, origin: sample.point, sample, hitsByMode, obstacleEvents });
            }
          }

          progress.rays += 1;
          batchCount += 1;
          if (batchCount >= quality.yieldEvery) {
            batchCount = 0;
            await yieldToBrowser();
          }
        }
      }

      return { samples, rays, modeData: new Map() };
    }

    function candidateDataForMode(sharedData, mode) {
      if (sharedData.modeData.has(mode)) return sharedData.modeData.get(mode);
      const candidates = [];
      const blockerMap = new Map();

      for (const ray of sharedData.rays) {
        const modeDistance = Number(ray.hitsByMode[mode]);
        if (!Number.isFinite(modeDistance) || modeDistance <= 2) continue;
        if (ray.obstacleEvents.internalBlockDistance < modeDistance) continue;

        const profile = blockerProfileFromFastEvents(ray.obstacleEvents, modeDistance);
        for (const blocker of profile.blockers) {
          const key = `${blocker.zoneName || ""}:${blocker.dong || ""}`;
          const current = blockerMap.get(key);
          if (!current || blocker.distance < current.distance) blockerMap.set(key, blocker);
        }

        const rad = Cesium.Math.toRadians(ray.angle);
        const end = {
          x: ray.origin.x + Math.sin(rad) * modeDistance,
          y: ray.origin.y + Math.cos(rad) * modeDistance
        };
        candidates.push({
          angle: ray.angle,
          distance: modeDistance,
          origin: ray.origin,
          end,
          blockerHeight: profile.maxBlockerHeight,
          blockers: profile.blockers,
          sample: ray.sample
        });
      }

      const result = {
        samples: sharedData.samples,
        candidates,
        angleProfiles: buildAngleProfiles(candidates),
        blockers: [...blockerMap.values()].sort((a, b) => a.distance - b.distance)
      };
      sharedData.modeData.set(mode, result);
      return result;
    }

    function collectFacadeCandidates(footprint) {
      const sharedData = sharedCandidateDataByFid.get(String(footprint.fid));
      if (!sharedData) {
        return { samples: [], candidates: [], angleProfiles: [], blockers: [] };
      }
      return candidateDataForMode(sharedData, currentRiverMode);
    }
  </script>

  <script type="text/plain" id="floorBandsPatch">
    function buildFloorBands(footprint, candidateData, summaryCache = null) {
      const floorCount = Math.max(1, Math.round(footprint.floors || 1));
      const cache = summaryCache || new Map();
      const summaryForFloor = floor => {
        if (cache.has(floor)) return cache.get(floor);
        const summary = summarizeFacadeCandidates(footprint, candidateData, floorEyeHeight(footprint, floor));
        cache.set(floor, summary);
        return summary;
      };

      const bands = [];
      let previous = null;
      for (let floor = 1; floor <= floorCount; floor += 1) {
        const summary = summaryForFloor(floor);
        const comparable = { totalOpen: summary.totalOpen };
        if (!previous) {
          previous = { start: floor, end: floor, comparable, summary };
          continue;
        }
        if (comparable.totalOpen === previous.comparable.totalOpen) {
          previous.end = floor;
        } else {
          bands.push(previous);
          previous = {
            start: floor,
            end: floor,
            comparable,
            summary,
            transitionCause: explainFloorTransition(candidateData, previous.summary, summary, floor)
          };
        }
      }
      if (previous) bands.push(previous);
      return bands;
    }
  </script>

  <script type="text/plain" id="analysisPatch">
    function optimizedAnalysisForMode(footprint, candidateData, context) {
      const closest = closestPointOnPolyline(footprint.center, context.segments);
      const direction = closest ? bearingTo(footprint.center, closest.point) : null;
      const displayFloor = Math.max(1, Math.round(footprint.floors || 1));
      const floorViewCache = new Map();
      const facadeView = summarizeFacadeCandidates(
        footprint,
        candidateData,
        floorEyeHeight(footprint, displayFloor)
      );
      floorViewCache.set(displayFloor, facadeView);

      const floorBands = buildFloorBands(footprint, candidateData, floorViewCache);
      const totalOpen = facadeView.totalOpen;
      const grade = totalOpen >= 60 ? "전면 조망" :
        totalOpen >= 30 ? "양호한 부분 조망" :
        totalOpen >= 10 ? "틈새 조망" :
        facadeView.visibleFacadeLength > 0 ? "제한적 조망" : "차폐";

      return {
        riverDistance: closest ? closest.distance : null,
        riverBearing: direction,
        riverBearingName: direction === null ? "" : bearingName(direction),
        targetSpan: facadeView.targetSpan,
        openByDirection: facadeView.openByDirection,
        openRaysByDirection: facadeView.openRaysByDirection,
        allOpenSummary: facadeView.allOpenSummary,
        allOpenRays: facadeView.allOpenRays,
        totalOpen,
        visibleFacadeLength: facadeView.visibleFacadeLength,
        visibleFacadeSegments: facadeView.visibleFacadeSegments,
        visibleSampleCount: facadeView.visibleSampleCount,
        sampleCount: facadeView.sampleCount,
        candidateData,
        floorBands,
        floorViewCache,
        displayFloor,
        displayEyeHeight: facadeView.observerHeight,
        blockers: facadeView.blockers.slice(0, 3),
        grade
      };
    }

    async function runOptimizedZoneAnalysis(zoneId, generation) {
      const normalizedZoneId = normalizeZoneId(zoneId);
      const cacheKey = normalizedZoneId || "ALL";
      if (cacheKey === "ALL") return;

      await preloadRiverModeFiles();
      if (generation !== optimizedCalculationGeneration) return;

      const zoneIds = currentLoadedZoneIds();
      const contexts = [];
      for (const mode of Object.keys(RIVER_MODE_CONFIGS)) {
        const state = preparedRiverState(mode, zoneIds);
        if (state && state.context) contexts.push({ mode, context: state.context });
      }
      if (contexts.length !== Object.keys(RIVER_MODE_CONFIGS).length) {
        throw new Error("보수적·완화적 한강라인 준비가 완료되지 않았습니다.");
      }

      const commonPoints = optimizedCommonRiverPoints(contexts);
      const footprintSnapshot = footprints.slice();
      const targets = footprintSnapshot.filter(fp => normalizeZoneId(fp.zoneName) === cacheKey);
      if (!targets.length) throw new Error(`${zoneLabelForStatus(cacheKey)} 계산 대상 유닛이 없습니다.`);

      const blockerIndex = buildFastBlockerIndex(footprintSnapshot, 80);
      const modeAnalysisMaps = new Map(
        Object.keys(RIVER_MODE_CONFIGS).map(mode => [mode, new Map()])
      );
      const quality = {
        sampleStep: targets.length <= 70 ? 8 : 9,
        angleStep: 1,
        yieldEvery: 120
      };

      viewAnalysisCacheByMode.clear();
      sharedCandidateDataByFid.clear();
      const started = performance.now();
      const progress = {
        completed: 0,
        total: targets.length,
        current: "",
        rays: 0
      };

      const renderProgress = () => {
        const elapsed = ((performance.now() - started) / 1000).toFixed(1);
        setStatus(
          `${zoneLabelForStatus(cacheKey)} 전체 유닛 계산 중...\n` +
          `보수적·완화적 동시 계산\n` +
          `완료: ${progress.completed}/${progress.total}\n` +
          `현재: ${progress.current || "준비 중"}\n` +
          `처리 레이: ${progress.rays.toLocaleString()}개\n` +
          `경과: ${elapsed}초`
        );
      };

      renderProgress();
      await yieldToBrowser();
      const progressTimer = setInterval(renderProgress, 500);

      try {
        for (let index = 0; index < targets.length; index += 1) {
          if (generation !== optimizedCalculationGeneration) return;
          const footprint = targets[index];
          progress.current = `${index + 1}/${targets.length} · ${footprint.dong || ""}동 ${footprint.unitType || ""}PY`;
          renderProgress();

          const sharedData = await collectSharedFacadeCandidatesAsync(
            footprint,
            contexts,
            blockerIndex,
            commonPoints,
            quality,
            progress,
            generation
          );
          if (!sharedData || generation !== optimizedCalculationGeneration) return;
          sharedCandidateDataByFid.set(String(footprint.fid), sharedData);

          for (const item of contexts) {
            const candidateData = candidateDataForMode(sharedData, item.mode);
            const analysis = optimizedAnalysisForMode(footprint, candidateData, item.context);
            modeAnalysisMaps.get(item.mode).set(String(footprint.fid), analysis);
          }

          progress.completed = index + 1;
          renderProgress();
          await yieldToBrowser();
        }

        if (generation !== optimizedCalculationGeneration) return;
        for (const [mode, analysis] of modeAnalysisMaps.entries()) {
          viewAnalysisCacheByMode.set(mode, {
            analysis,
            calculatedZones: new Set([cacheKey])
          });
        }

        activatePreparedRiverMode(currentRiverMode, { zoneIds, draw: true });
        restoreAnalysisCacheForMode(currentRiverMode);
        riverModesReady = true;
        setRiverModeButtonsDisabled(false);
        updateRiverModeNote();
        const seconds = ((performance.now() - started) / 1000).toFixed(1);
        setStatus(
          `${zoneLabelForStatus(cacheKey)} 전체 계산 완료\n` +
          `보수적·완화적 전체 유닛 및 전층 결과 저장 완료\n` +
          `유닛: ${targets.length}개\n` +
          `처리 레이: ${progress.rays.toLocaleString()}개\n` +
          `소요: ${seconds}초`
        );

        setTimeout(() => {
          if (!osmBuildingsTileset && !osmBuildingsLoading) showOsmBuildings();
        }, 300);
      } finally {
        clearInterval(progressTimer);
      }
    }

    function storeViewAnalysisForFootprint() {
      return false;
    }

    function runZoneAnalysis(zoneId) {
      return prepareBothRiverModeAnalyses(zoneId);
    }

    function analyzeViewsForZone(zoneId) {
      return prepareBothRiverModeAnalyses(zoneId);
    }
  </script>

  <script type="text/plain" id="preparePatch">
    async function prepareBothRiverModeAnalyses(zoneId = currentZoneId) {
      if (zoneId === "ALL") return;
      const generation = optimizedCalculationGeneration;
      if (riverModesAnalysisPromise) {
        if (optimizedAnalysisPromiseGeneration === generation) return riverModesAnalysisPromise;
        try {
          await riverModesAnalysisPromise;
        } catch (_) {
        }
      }

      riverModesReady = false;
      setRiverModeButtonsDisabled(true);
      updateRiverModeNote();
      optimizedAnalysisPromiseGeneration = generation;
      const promise = runOptimizedZoneAnalysis(zoneId, generation);
      riverModesAnalysisPromise = promise.finally(() => {
        if (optimizedAnalysisPromiseGeneration === generation) {
          riverModesAnalysisPromise = null;
          optimizedAnalysisPromiseGeneration = -1;
        }
      });
      return riverModesAnalysisPromise;
    }
  </script>

  <script type="text/plain" id="floorViewPatch">
    function summaryForAnalysisFloor(footprint, analysis, floor) {
      if (!analysis.floorViewCache) analysis.floorViewCache = new Map();
      if (analysis.floorViewCache.has(floor)) return analysis.floorViewCache.get(floor);
      const summary = summarizeFacadeCandidates(
        footprint,
        analysis.candidateData,
        floorEyeHeight(footprint, floor)
      );
      analysis.floorViewCache.set(floor, summary);
      return summary;
    }

    function floorViewForEntity(entity, forcedFloor = null) {
      const footprint = entity && entity.polygon
        ? (entity.footprintForSight || footprints.find(f => String(f.fid) === String(entity.fidValue)))
        : null;
      if (!entity || !footprint || !entity.fidValue) return null;
      const analysis = viewAnalysisByFid.get(String(entity.fidValue));
      if (!analysis || !analysis.candidateData) return null;
      const floor = forcedFloor || selectedFloorForEntity(entity, footprint);
      if (!floor) return null;
      return {
        floor,
        footprint,
        analysis,
        view: summaryForAnalysisFloor(footprint, analysis, floor)
      };
    }
  </script>

  <script type="text/plain" id="switchAndRecalcPatch">
    async function switchRiverMode(mode) {
      if (!RIVER_MODE_CONFIGS[mode]) return;
      if (currentZoneId === "ALL") {
        setStatus("먼저 2~5구역 중 하나를 선택하세요.");
        return;
      }
      if (!riverModesReady && riverModesAnalysisPromise) {
        setStatus(`${zoneLabelForStatus(currentZoneId)} 전체 유닛 계산 완료 후 자동으로 전환합니다.`);
        await riverModesAnalysisPromise;
      }
      if (!riverModesReady || !viewAnalysisCacheByMode.has(mode)) {
        setStatus("현재 구역의 계산 결과가 준비되지 않았습니다.");
        return;
      }
      if (mode === currentRiverMode) {
        setActiveRiverButton(mode);
        updateRiverModeNote();
        return;
      }

      const selectedEntity = viewer.selectedEntity;
      try {
        activatePreparedRiverMode(mode, { zoneIds: currentLoadedZoneIds(), draw: true });
        restoreAnalysisCacheForMode(mode);
        if (selectedEntity) {
          drawSelectedSightLines(selectedEntity);
          updateSelectionDetails(selectedEntity);
        }
        updateFloorTotalAngle(selectedEntity);
        setStatus(`${activeRiverConfig().label} 저장 결과로 즉시 전환했습니다.`);
      } catch (error) {
        setStatus(`${activeRiverConfig().label} 전환 실패: ${error.message}`);
      }
    }

    async function recalculateViews(message = "조망 계산 갱신 완료") {
      if (currentZoneId === "ALL") {
        setStatus("전체 화면에서는 조망 계산을 실행하지 않습니다. 2~5구역 중 하나를 선택하세요.");
        return;
      }
      optimizedCalculationGeneration += 1;
      preparedRiverStateByMode.clear();
      resetViewAnalysisCache();
      await prepareBothRiverModeAnalyses(currentZoneId);
      setStatus(`${message}\n현재 구역의 보수적·완화적 전체 유닛을 다시 계산했습니다.`);
      if (viewer.selectedEntity) {
        drawSelectedSightLines(viewer.selectedEntity);
        updateSelectionDetails(viewer.selectedEntity);
      }
      updateFloorTotalAngle(viewer.selectedEntity);
    }
  </script>

  <script type="text/plain" id="loadZonePatch">
    async function loadZone(zoneId) {
      const config = ZONE_CONFIGS[zoneId] || ZONE_CONFIGS["2"];
      const generation = ++optimizedCalculationGeneration;
      currentZoneId = zoneId;
      setActiveZoneButton(zoneId);
      riverModesReady = false;
      setRiverModeButtonsDisabled(true);
      updateRiverModeNote();
      setStatus(`${config.label} 데이터를 불러오는 중입니다.`);

      try {
        const zoneIds = config.zoneIds ? config.zoneIds.slice() : [zoneId];
        const riverFilesPromise = preloadRiverModeFiles();
        const unitsPromise = config.zoneIds
          ? Promise.all(
              zoneIds.map(async id => ({
                zoneId: id,
                data: await fetchGeoJson(ZONE_CONFIGS[id].unitsUrl)
              }))
            ).then(combineFeatureCollections)
          : fetchGeoJson(config.unitsUrl).then(data =>
              combineFeatureCollections([{ zoneId, data }])
            );

        const [, unitsData] = await Promise.all([riverFilesPromise, unitsPromise]);
        if (generation !== optimizedCalculationGeneration) return;
        preparedRiverStateByMode.clear();
        activatePreparedRiverMode(currentRiverMode, { zoneIds, draw: true });
        await loadGeoJson(unitsData, config.label);
        if (generation !== optimizedCalculationGeneration) return;

        if (zoneId === "ALL") {
          riverModesReady = false;
          setRiverModeButtonsDisabled(true);
          updateRiverModeNote();
          setStatus(
            "지도 로드 완료\n" +
            "전체 조망 계산은 시작하지 않았습니다.\n" +
            "2~5구역 중 하나를 선택하면 해당 구역의 보수적·완화적 전체 유닛을 계산합니다."
          );
          return;
        }

        await prepareBothRiverModeAnalyses(zoneId);
      } catch (error) {
        if (generation !== optimizedCalculationGeneration) return;
        riverModesReady = false;
        setRiverModeButtonsDisabled(false);
        updateRiverModeNote();
        setStatus(`${config.label} 로드 또는 계산 실패: ${error.message}`);
      }
    }
  </script>

  <script type="text/plain" id="selectionPatch">
    viewer.selectedEntityChanged.addEventListener(async (entity) => {
      updateEyeFloorInput(entity);
      clearSelectedSightLines();

      if (!entity || !entity.polygon || !entity.fidValue) {
        if (lastPickedHeightScreenPosition) {
          setTimeout(() => updatePickedHeightDetails(lastPickedHeightScreenPosition), 0);
        } else {
          updateSelectionDetails(null);
        }
        return;
      }

      showLegendForSelectedEntity(entity);
      updateSelectionDetails(entity);
      if (currentZoneId === "ALL") {
        setStatus("먼저 2~5구역 중 하나를 선택하세요. 전체 화면에서는 조망 계산을 하지 않습니다.");
        return;
      }

      if (!viewAnalysisByFid.has(String(entity.fidValue)) && riverModesAnalysisPromise) {
        await riverModesAnalysisPromise;
      }
      if (viewer.selectedEntity !== entity) return;
      if (!viewAnalysisByFid.has(String(entity.fidValue))) {
        setStatus("현재 구역 전체 유닛 계산이 아직 완료되지 않았습니다.");
        return;
      }

      drawSelectedSightLines(entity);
      updateSelectionDetails(entity);
      updateFloorTotalAngle(entity);
    });
  </script>

  <script>
    (() => {
      const BASE_FILE = "./index_v44_base.html?v=20260711-50";
      const message = document.getElementById("bootMessage");

      function replaceRequired(source, before, after, label) {
        const index = source.indexOf(before);
        if (index < 0) throw new Error(`${label} 수정 위치를 찾지 못했습니다.`);
        return source.slice(0, index) + after + source.slice(index + before.length);
      }

      function replaceBlock(source, startMarker, endMarker, replacement, label) {
        const start = source.indexOf(startMarker);
        const end = source.indexOf(endMarker, start + startMarker.length);
        if (start < 0 || end < 0 || end <= start) throw new Error(`${label} 함수 범위를 찾지 못했습니다.`);
        return source.slice(0, start) + replacement + "\n\n" + source.slice(end);
      }

      function patchText(id) {
        return document.getElementById(id).textContent.replace(/^\n/, "").trimEnd();
      }

      async function boot() {
        const response = await fetch(BASE_FILE, { cache: "no-store" });
        if (!response.ok) throw new Error(`기본 앱 로드 실패: HTTP ${response.status}`);
        let source = await response.text();

        source = replaceRequired(
          source,
          '<div class="hint">버전: v44 · 업데이트: 2026.07.11 / <strong>정밀도면이 아닙니다</strong></div>',
          '<div class="hint">버전: v50 · 업데이트: 2026.07.11 / <strong>정밀도면이 아닙니다</strong></div>',
          "버전"
        );
        source = replaceRequired(
          source,
          'const DATA_VERSION = "v44-dual-river-preload-20260711";',
          'const DATA_VERSION = "v50-full-zone-fast-grid-20260711";',
          "데이터 버전"
        );
        source = replaceRequired(
          source,
          '    let riverModesReady = false;',
          '    let riverModesReady = false;\n    const sharedCandidateDataByFid = new Map();\n    let optimizedCalculationGeneration = 0;\n    let optimizedAnalysisPromiseGeneration = -1;',
          "최적화 캐시 변수"
        );

        source = replaceBlock(source, "    function updateRiverModeNote() {", "    function currentLoadedZoneIds() {", patchText("updateRiverModeNotePatch"), "한강라인 안내");
        source = replaceBlock(source, "    function resetViewAnalysisCache() {", "    function zoneLabelForStatus", patchText("resetCachePatch"), "캐시 초기화");
        source = replaceBlock(source, "    function collectFacadeCandidates(footprint) {", "    function summarizeFacadeCandidates", patchText("candidatePatch"), "고속 공통 레이 계산");
        source = replaceBlock(source, "    function buildFloorBands(footprint, candidateData) {", "    function clearSelectedSightLines", patchText("floorBandsPatch"), "전층 결과 계산");
        source = replaceBlock(source, "    function storeViewAnalysisForFootprint(footprint) {", "    function clearOutlines", patchText("analysisPatch"), "구역 전체 계산");
        source = replaceBlock(source, "    async function prepareBothRiverModeAnalyses(zoneId = currentZoneId) {", "    function applyPublicBaseMap", patchText("preparePatch"), "두 기준 준비");
        source = replaceBlock(source, "    function floorViewForEntity(entity, forcedFloor = null) {", "    function updateFloorTotalAngle", patchText("floorViewPatch"), "층수 결과 캐시");
        source = replaceBlock(source, "    async function switchRiverMode(mode) {", "    async function loadGeoJson", patchText("switchAndRecalcPatch"), "한강라인 전환");
        source = replaceBlock(source, "    async function loadZone(zoneId) {", "    function applyVworldBaseMap", patchText("loadZonePatch"), "구역 선택 계산");
        source = replaceBlock(source, "    viewer.selectedEntityChanged.addEventListener(async (entity) => {", "    setActiveRiverButton(currentRiverMode);", patchText("selectionPatch"), "유닛 선택");

        const osmAutoLoadOld = ["    setTimeout(() => {", "      showOsmBuildings();", "    }, 3000);"].join("\n");
        const osmAutoLoadNew = ["    setTimeout(() => {", "      if (currentZoneId === \"ALL\" && !riverModesAnalysisPromise) showOsmBuildings();", "    }, 12000);"].join("\n");
        if (source.includes(osmAutoLoadOld)) source = source.replace(osmAutoLoadOld, osmAutoLoadNew);

        document.open();
        document.write(source);
        document.close();
      }

      boot().catch(error => {
        console.error(error);
        message.classList.add("error");
        message.textContent = `앱 수정본을 불러오지 못했습니다.\n${error.message}`;
      });
    })();
  </script>
