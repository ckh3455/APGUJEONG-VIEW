<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>압구정 조망후보 지도</title>
  <style>
    html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#fff}
    #loading{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;font-family:Arial,sans-serif;color:#334155;background:#fff;z-index:9999}
  </style>
</head>
<body>
<div id="loading">조망후보 지도를 불러오는 중입니다…</div>
<script>
(async () => {
  const params = new URLSearchParams(location.search);
  const encoded = params.get('cfg') || '';
  let config = null;
  try {
    const normalized = encoded.replace(/-/g, '+').replace(/_/g, '/');
    const padded = normalized + '='.repeat((4 - normalized.length % 4) % 4);
    const bytes = Uint8Array.from(atob(padded), c => c.charCodeAt(0));
    config = JSON.parse(new TextDecoder().decode(bytes));
  } catch (error) {
    document.getElementById('loading').textContent = '후보 지도 설정을 읽지 못했습니다: ' + error.message;
    return;
  }

  try {
    const response = await fetch('./index.html?v=' + Date.now(), {cache:'no-store'});
    if (!response.ok) throw new Error('index.html HTTP ' + response.status);
    let html = await response.text();
    const configJson = JSON.stringify(config).replace(/<\//g, '<\\/');
    const setup = `<script>window.APJ_VIEW_CANDIDATE_CONFIG=${configJson};<\/script>`;
    const candidateStyle = `<style>
      .panel{
        transform:scale(.75) !important;
        transform-origin:top left !important;
        width:500px !important;
        max-width:none !important;
        max-height:none !important;
        overflow:visible !important;
      }
      .panel .buttons{
        display:flex !important;
        flex-wrap:wrap !important;
        align-items:center !important;
        gap:5px !important;
      }
      #resetInitialView{
        display:inline-flex !important;
        visibility:visible !important;
        opacity:1 !important;
        align-items:center !important;
        justify-content:center !important;
        background:#475569 !important;
        color:#fff !important;
        min-height:28px !important;
        padding:5px 8px !important;
        white-space:nowrap !important;
        z-index:20 !important;
      }
    </style>`;
    const adapter = `<script>
(function(){
  const cfg = window.APJ_VIEW_CANDIDATE_CONFIG;
  if(!cfg || !cfg.enabled) return;
  const entryMap = new Map((cfg.entries||[]).map(e=>[String(e.fid),e]));
  const rankedEntries = (cfg.entries||[]).slice().sort((a,b)=>{
    const angleDiff = Number(b.bestViewAngle||0) - Number(a.bestViewAngle||0);
    if(angleDiff !== 0) return angleDiff;
    return String(a.fid).localeCompare(String(b.fid), undefined, {numeric:true});
  });
  const rankMap = new Map(rankedEntries.map((e,i)=>[String(e.fid), i+1]));
  let appliedSource = null;
  let loadingRequested = false;
  let initialViewApplied = false;

  function valueOf(prop){
    try{return prop && typeof prop.getValue==='function' ? prop.getValue(Cesium.JulianDate.now()) : prop;}catch(e){return prop;}
  }
  function fidOf(entity){
    if(entity && entity.fidValue!=null) return String(entity.fidValue);
    const p=entity && entity.properties;
    const fid=p && valueOf(p.fid);
    const sourceFid=p && valueOf(p.source_fid);
    const zone=p && (valueOf(p.source_zone)||valueOf(p.zone));
    const candidates=[fid,sourceFid,zone!=null&&sourceFid!=null?String(zone)+'-'+String(sourceFid):null];
    for(const v of candidates){if(v!=null&&entryMap.has(String(v))) return String(v);}
    return fid==null?'':String(fid);
  }
  function entryFor(entity){
    const key=fidOf(entity);
    if(entryMap.has(key)) return entryMap.get(key);
    const p=entity&&entity.properties;
    const sourceFid=p&&valueOf(p.source_fid);
    const zone=p&&(valueOf(p.source_zone)||valueOf(p.zone));
    for(const e of cfg.entries||[]){
      const ef=String(e.fid);
      if(sourceFid!=null&&(ef===String(sourceFid)||ef===String(zone)+'-'+String(sourceFid))) return e;
    }
    return null;
  }
  function clearCandidateLabels(){
    if(!window.__apjCandidateLabels) window.__apjCandidateLabels=[];
    while(window.__apjCandidateLabels.length){
      try{viewer.entities.remove(window.__apjCandidateLabels.pop());}catch(e){break;}
    }
  }
  function resetInitialView(){
    try{
      if(typeof stopAutoRotate==='function') stopAutoRotate();
      viewer.selectedEntity=undefined;
      viewer.camera.lookAtTransform(Cesium.Matrix4.IDENTITY);
      viewer.camera.setView({
        destination:Cesium.Cartesian3.fromDegrees(127.03255,37.52545,1450),
        orientation:{heading:Cesium.Math.toRadians(335),pitch:Cesium.Math.toRadians(-50),roll:0}
      });
      viewer.scene.requestRender();
    }catch(e){console.error('reset initial view',e);}
  }
  function addResetButton(){
    const existing=document.getElementById('resetInitialView');
    if(existing){existing.style.display='inline-flex';return true;}
    const stop=document.getElementById('stopRotate');
    if(!stop||!stop.parentElement) return false;
    const button=document.createElement('button');
    button.id='resetInitialView';
    button.type='button';
    button.className='secondary';
    button.textContent='초기지도복귀';
    button.title='처음 지도 화면으로 돌아갑니다';
    button.addEventListener('click',resetInitialView);
    stop.insertAdjacentElement('afterend',button);
    return true;
  }
  function apply(){
    if(typeof viewer==='undefined'||typeof unitsDataSource==='undefined'||!unitsDataSource) return false;
    addResetButton();
    if(appliedSource===unitsDataSource) return true;
    appliedSource=unitsDataSource;
    clearCandidateLabels();
    const matched=[];
    for(const entity of unitsDataSource.entities.values){
      if(!entity.polygon) continue;
      const entry=entryFor(entity);
      const entityFid=String(fidOf(entity));
      const isBest=entry && entityFid===String(cfg.bestFid);
      const rank=entry ? (rankMap.get(entityFid)||0) : 0;
      entity.show=true;
      entity.polygon.show=true;
      if(entity.label) entity.label.show=false;
      const base=entity.baseColor||Cesium.Color.GRAY;
      entity.polygon.material=base.withAlpha(1.0);
      entity.polygon.outline=true;
      entity.polygon.outlineColor=Cesium.Color.BLACK;
      if(entry){
        matched.push(entity);
        if(isBest){
          entity.polygon.material=Cesium.Color.fromCssColorString('#ffe600').withAlpha(1.0);
          entity.polygon.outlineColor=Cesium.Color.fromCssColorString('#00ff66');
        }
        const pos=entity.positionForSight;
        if(pos&&pos.xy&&typeof xyToLonLat==='function'){
          const ll=xyToLonLat(pos.xy);
          const h=Math.max(35,Number(pos.height||80)+(isBest?30:18));
          const label=viewer.entities.add({
            position:Cesium.Cartesian3.fromDegrees(ll.lon,ll.lat,h),
            label:{
              text:String(rank),
              font:isBest?'900 26px sans-serif':'900 20px sans-serif',
              fillColor:isBest
                ? Cesium.Color.fromCssColorString('#111827')
                : Cesium.Color.fromCssColorString('#0f172a'),
              outlineColor:isBest?Cesium.Color.WHITE:Cesium.Color.TRANSPARENT,
              outlineWidth:isBest?3:0,
              style:isBest?Cesium.LabelStyle.FILL_AND_OUTLINE:Cesium.LabelStyle.FILL,
              showBackground:true,
              backgroundColor:isBest
                ? Cesium.Color.fromCssColorString('#ffe600').withAlpha(0.96)
                : Cesium.Color.fromCssColorString('#ffffff').withAlpha(0.94),
              backgroundPadding:new Cesium.Cartesian2(isBest?11:8,isBest?9:6),
              pixelOffset:new Cesium.Cartesian2(0,isBest?-20:-12),
              disableDepthTestDistance:Number.POSITIVE_INFINITY
            }
          });
          window.__apjCandidateLabels.push(label);
        }
      }
    }
    if(typeof mapMainTitleEl!=='undefined'&&mapMainTitleEl) mapMainTitleEl.textContent=cfg.title||'조망후보';
    if(typeof candidateSummaryEl!=='undefined'&&candidateSummaryEl){
      candidateSummaryEl.innerHTML='<b>숫자는 조망각이 높은 순위입니다.</b><br>1번이 최고 조망후보입니다.';
      candidateSummaryEl.hidden=false;
    }
    if(matched.length){
      const best=matched.find(e=>String(fidOf(e))===String(cfg.bestFid))||matched[0];
      setTimeout(()=>{try{viewer.selectedEntity=best;}catch(e){}},300);
    }
    if(!initialViewApplied){initialViewApplied=true;setTimeout(resetInitialView,700);}
    try{viewer.scene.requestRender();}catch(e){}
    return true;
  }
  function ensureZone(){
    if(loadingRequested) return;
    if(typeof loadZone==='function'&&cfg.zoneId){
      loadingRequested=true;
      Promise.resolve(loadZone(String(cfg.zoneId))).finally(()=>{loadingRequested=false;appliedSource=null;});
    }
  }
  const buttonTimer=setInterval(addResetButton,250);
  setTimeout(()=>clearInterval(buttonTimer),20000);
  ensureZone();
  const timer=setInterval(()=>{try{addResetButton();if(apply()) clearInterval(timer);}catch(e){console.error('candidate adapter',e);}},250);
  setTimeout(()=>clearInterval(timer),20000);
})();
<\/script>`;
    html=html.replace('</head>',setup+'\n'+candidateStyle+'\n</head>');
    html=html.replace('</body>',adapter+'\n</body>');
    document.open();
    document.write(html);
    document.close();
  } catch (error) {
    document.getElementById('loading').textContent='지도를 불러오지 못했습니다: '+error.message;
  }
})();
</script>
</body>
</html>
