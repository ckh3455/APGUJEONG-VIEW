<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>압구정 조망 V58 전체 Geometry 시험</title><style>html,body,#app{width:100%;height:100%;margin:0;overflow:hidden;background:#eef2f5}#app{border:0;display:block}</style></head><body><iframe id="app" title="압구정 조망 시뮬레이션" src="./index_v55_zone_cache_light.html?v=20260711-55"></iframe><script>const code="\n(()=>{\n if(window.__APG_V58_ALL_GEOMETRY__)return;window.__APG_V58_ALL_GEOMETRY__=true;\n const S={on:true,targets:[],walls:[],roof:null,bottom:null,edges:null,signature:\"\",building:false};\n const textureCache=new Map();\n const css=document.createElement(\"style\");\n css.textContent=\"#geo58{position:fixed;z-index:99999;right:14px;top:14px;width:270px;padding:12px;border:1px solid #9aa4ad;border-radius:12px;background:rgba(24,31,39,.95);box-shadow:0 9px 28px rgba(0,0,0,.28);font:12px Arial,'Malgun Gothic',sans-serif;color:#fff}#geo58 b{display:block;font-size:14px;color:#eef2f5;margin-bottom:8px}#geo58 .row{display:grid;grid-template-columns:1fr 1fr;gap:6px}#geo58 button{padding:8px 5px;border:1px solid #77828d;border-radius:8px;background:#35404a;color:#eef2f5;font-weight:700;cursor:pointer}#geo58 button.on{background:#d8dde1;color:#17202a;border-color:#fff}#geo58 small{display:block;color:#cbd5e1;line-height:1.45;margin-top:8px}#geo58 em{display:block;color:#9ed5e8;font-style:normal;margin-top:6px}\";\n document.head.appendChild(css);\n const box=document.createElement(\"div\");box.id=\"geo58\";\n box.innerHTML='<b>V58 전체 유닛 Geometry 시험</b><div class=\"row\"><button id=\"gBase58\">원본</button><button id=\"gModel58\" class=\"on\">Geometry</button></div><button id=\"gFocus58\" style=\"width:100%;margin-top:6px\">전체 조감</button><small>현재 지도 전체 유닛에 구역별 외벽 패턴과 층수별 Geometry를 적용합니다.</small><em id=\"gStatus58\">전체 유닛을 준비하는 중…</em>';\n document.body.appendChild(box);\n const baseBtn=box.querySelector(\"#gBase58\"),modelBtn=box.querySelector(\"#gModel58\"),focusBtn=box.querySelector(\"#gFocus58\"),statusEl=box.querySelector(\"#gStatus58\");\n function val(p,t){return p&&typeof p.getValue===\"function\"?p.getValue(t):p;}\\n function prop(e,name,t){return e&&e.properties&&e.properties[name]?val(e.properties[name],t):\"\";}\n function colorKey(color){return [color.red,color.green,color.blue].map(v=>Math.round(Math.max(0,Math.min(1,v))*255)).join(\"-\");}\n function panelTexture(unitColor){\n  const key=colorKey(unitColor);if(textureCache.has(key))return textureCache.get(key);\n  const c=document.createElement(\"canvas\");c.width=128;c.height=128;const x=c.getContext(\"2d\");\n  const grad=x.createLinearGradient(0,0,128,0);grad.addColorStop(0,\"#8e979e\");grad.addColorStop(.18,\"#d5dade\");grad.addColorStop(.5,\"#b6bec4\");grad.addColorStop(.82,\"#e4e7e9\");grad.addColorStop(1,\"#9099a0\");\n  x.fillStyle=grad;x.fillRect(0,0,128,128);\n  x.strokeStyle=\"rgba(55,65,73,.65)\";x.lineWidth=2;\n  for(let i=0;i<=128;i+=32){x.beginPath();x.moveTo(i,0);x.lineTo(i,128);x.stroke();}\n  x.strokeStyle=\"rgba(48,58,66,.72)\";x.lineWidth=3;x.beginPath();x.moveTo(0,2);x.lineTo(128,2);x.stroke();x.beginPath();x.moveTo(0,126);x.lineTo(128,126);x.stroke();\n  x.fillStyle=\"rgba(255,255,255,.22)\";x.fillRect(3,4,3,120);x.fillRect(67,4,2,120);\n  const rr=Math.round(unitColor.red*255),gg=Math.round(unitColor.green*255),bb=Math.round(unitColor.blue*255);\n  x.fillStyle=\"rgba(\"+rr+\",\"+gg+\",\"+bb+\",.16)\";x.fillRect(0,0,128,128);\n  x.strokeStyle=\"rgba(35,44,52,.72)\";x.lineWidth=2;for(let i=0;i<=128;i+=32){x.beginPath();x.moveTo(i,0);x.lineTo(i,128);x.stroke();}\n  x.strokeStyle=\"rgba(240,244,247,.48)\";x.lineWidth=1;for(let i=16;i<128;i+=32){x.beginPath();x.moveTo(i,0);x.lineTo(i,128);x.stroke();}\n  if(String(zone)===\"2\"){\n   x.strokeStyle=\"rgba(225,244,255,.62)\";x.lineWidth=2;\n   for(let i=8;i<128;i+=16){x.beginPath();x.moveTo(i,0);x.lineTo(i,128);x.stroke();}\n  }else if(String(zone)===\"3\"){\n   x.strokeStyle=\"rgba(31,42,50,.75)\";x.lineWidth=2;\n   for(let i=0;i<128;i+=32){for(const d of [0,7]){x.beginPath();x.moveTo(i+d,0);x.lineTo(i+d,128);x.stroke();}}\n  }else if(String(zone)===\"4\"){\n   x.fillStyle=\"rgba(255,255,255,.10)\";x.fillRect(0,0,58,128);x.fillRect(68,0,54,128);\n   x.strokeStyle=\"rgba(42,52,60,.82)\";x.lineWidth=4;x.beginPath();x.moveTo(64,0);x.lineTo(64,128);x.stroke();\n  }else if(String(zone)===\"5\"){\n   x.strokeStyle=\"rgba(28,39,47,.80)\";x.lineWidth=5;\n   for(let i=0;i<128;i+=48){x.beginPath();x.moveTo(i,0);x.lineTo(i,128);x.stroke();}\n   x.strokeStyle=\"rgba(235,247,255,.55)\";x.lineWidth=2;\n   for(let i=5;i<128;i+=48){x.beginPath();x.moveTo(i,0);x.lineTo(i,128);x.stroke();}\n  }\n  const url=c.toDataURL(\"image/png\");textureCache.set(key,url);return url;\n }\n function collect(){\n  if(typeof viewer===\"undefined\"||!viewer||!viewer.dataSources)return[];\n  const now=Cesium.JulianDate.now(),out=[],seen=new Set();\n  const add=source=>{if(!source||!source.entities)return;for(const e of source.entities.values){if(seen.has(e))continue;seen.add(e);const h=e.polygon&&val(e.polygon.hierarchy,now);const p=h&&(h.positions||h);if(e.polygon&&p&&p.length>=3)out.push(e);}};\n  if(typeof unitsDataSource!==\"undefined\")add(unitsDataSource);\n  for(let i=0;i<viewer.dataSources.length;i++)add(viewer.dataSources.get(i));\n  return out;\n }\n function signature(list){\n  const now=Cesium.JulianDate.now();\n  return list.map((e,i)=>String(e.id||e.name||i)+\":\"+String(Number(val(e.polygon.extrudedHeight,now))||0)).sort().join(\"|\");\n }\n function clearAll(){\n  for(const item of S.targets){try{item.entity.polygon.show=item.show;}catch(_){}}\n  for(const p of S.walls)try{viewer.scene.primitives.remove(p);}catch(_){}\n  for(const p of [S.roof,S.bottom,S.edges])if(p)try{viewer.scene.primitives.remove(p);}catch(_){}\n  S.targets=[];S.walls=[];S.roof=null;S.bottom=null;S.edges=null;\n }\n function apply(){\n  for(const item of S.targets)item.entity.polygon.show=!S.on;\n  for(const p of S.walls)p.show=S.on;\n  if(S.roof)S.roof.show=S.on;if(S.bottom)S.bottom.show=S.on;if(S.edges)S.edges.show=S.on;\n  baseBtn.classList.toggle(\"on\",!S.on);modelBtn.classList.toggle(\"on\",S.on);\n  viewer.scene.requestRender();\n }\n function buildAll(list,sig){\n  if(S.building||!list.length)return;S.building=true;statusEl.textContent=\"전체 \"+list.length+\"개 유닛 Geometry 생성 중…\";\n  clearAll();\n  const now=Cesium.JulianDate.now(),wallGroups=new Map(),roofInstances=[],bottomInstances=[];\n  const edges=viewer.scene.primitives.add(new Cesium.PolylineCollection());S.edges=edges;\n  for(const e of list){\n   try{\n    const h=val(e.polygon.hierarchy,now),raw=h.positions||h;\n    const top=Number(val(e.polygon.extrudedHeight,now))||100,bottom=Number(val(e.polygon.height,now))||0;\n    const wallPos=[],mins=[],maxs=[],roofPos=[],bottomPos=[];\n    for(const p of raw){const cg=Cesium.Cartographic.fromCartesian(p);wallPos.push(Cesium.Cartesian3.fromRadians(cg.longitude,cg.latitude,bottom));mins.push(bottom);maxs.push(top);roofPos.push(Cesium.Cartesian3.fromRadians(cg.longitude,cg.latitude,top));bottomPos.push(Cesium.Cartesian3.fromRadians(cg.longitude,cg.latitude,bottom));}\n    wallPos.push(Cesium.Cartesian3.clone(wallPos[0]));mins.push(bottom);maxs.push(top);\n    const original=(e.baseColor&&Cesium.Color.clone(e.baseColor))||Cesium.Color.LIGHTGRAY;\n    const estimatedFloors=Math.max(1,Math.round((top-bottom)/3.3));\n    const zoneText=String(prop(e,\"zone\",now)||prop(e,\"source_zone\",now)||e.name||\"\");\n    const zoneMatch=zoneText.match(/[2-5]/),zone=zoneMatch?zoneMatch[0]:\"0\";\n    const key=zone+\"-\"+colorKey(original)+\"-f\"+estimatedFloors;\n    if(!wallGroups.has(key))wallGroups.set(key,{zone,color:original,floors:estimatedFloors,instances:[]});\n    wallGroups.get(key).instances.push(new Cesium.GeometryInstance({geometry:new Cesium.WallGeometry({positions:wallPos,minimumHeights:mins,maximumHeights:maxs,vertexFormat:Cesium.MaterialAppearance.MaterialSupport.TEXTURED.vertexFormat}),id:e}));\n    const roofTint=Cesium.Color.lerp(Cesium.Color.LIGHTGRAY,original,.40,new Cesium.Color());roofTint.alpha=1;\n    roofInstances.push(new Cesium.GeometryInstance({geometry:Cesium.PolygonGeometry.fromPositions({positions:roofPos,perPositionHeight:true,vertexFormat:Cesium.PerInstanceColorAppearance.VERTEX_FORMAT}),id:e,attributes:{color:Cesium.ColorGeometryInstanceAttribute.fromColor(roofTint)}}));\n    bottomInstances.push(new Cesium.GeometryInstance({geometry:Cesium.PolygonGeometry.fromPositions({positions:bottomPos,perPositionHeight:true,vertexFormat:Cesium.PerInstanceColorAppearance.VERTEX_FORMAT}),id:e,attributes:{color:Cesium.ColorGeometryInstanceAttribute.fromColor(new Cesium.Color(.19,.22,.24,1))}}));\n    const edgeColor=Cesium.Color.fromCssColorString(\"#394149\").withAlpha(1);\n    const roofLoop=roofPos.concat([roofPos[0]]),bottomLoop=bottomPos.concat([bottomPos[0]]);\n    edges.add({positions:roofLoop,width:1.25,material:Cesium.Material.fromType(\"Color\",{color:edgeColor})});\n    edges.add({positions:bottomLoop,width:1.0,material:Cesium.Material.fromType(\"Color\",{color:edgeColor})});\n    for(let i=0;i<raw.length;i++)edges.add({positions:[bottomPos[i],roofPos[i]],width:1.05,material:Cesium.Material.fromType(\"Color\",{color:edgeColor})});\n    S.targets.push({entity:e,show:val(e.polygon.show,now)});\n   }catch(error){console.warn(\"V58 unit skipped\",e&&e.id,error);}\n  }\n  for(const group of wallGroups.values()){\n   const material=Cesium.Material.fromType(\"Image\",{image:panelTexture(group.color,group.zone),repeat:new Cesium.Cartesian2(8,group.floors),color:new Cesium.Color(1,1,1,1)});\n   S.walls.push(viewer.scene.primitives.add(new Cesium.Primitive({geometryInstances:group.instances,appearance:new Cesium.MaterialAppearance({material,materialSupport:Cesium.MaterialAppearance.MaterialSupport.TEXTURED,translucent:false,closed:false,faceForward:true,renderState:{cull:{enabled:false},depthTest:{enabled:true},depthMask:true,blending:{enabled:false}}}),asynchronous:false})));\n  }\n  if(roofInstances.length)S.roof=viewer.scene.primitives.add(new Cesium.Primitive({geometryInstances:roofInstances,appearance:new Cesium.PerInstanceColorAppearance({translucent:false,closed:true,flat:false}),asynchronous:false}));\n  if(bottomInstances.length)S.bottom=viewer.scene.primitives.add(new Cesium.Primitive({geometryInstances:bottomInstances,appearance:new Cesium.PerInstanceColorAppearance({translucent:false,closed:true,flat:true}),asynchronous:false}));\n  S.signature=sig;S.building=false;apply();statusEl.textContent=\"전체 유닛 \"+S.targets.length+\"개 적용 · 색상·층수 묶음 \"+S.walls.length+\"개\";\n }\n function enhanceSightLasers(){\n  if(!window.Cesium||typeof selectedSightEntities===\"undefined\")return;\n  for(const line of selectedSightEntities){if(!line||line.__geo58Laser||!line.polyline)continue;const name=String(line.name||\"\");if(!name.includes(\"층 조망각\"))continue;line.__geo58Laser=true;line.polyline.width=8;line.polyline.material=new Cesium.PolylineGlowMaterialProperty({color:Cesium.Color.fromCssColorString(\"#009dff\").withAlpha(.98),glowPower:.42,taperPower:.92});line.polyline.depthFailMaterial=undefined;}\n  if(typeof viewer!==\"undefined\"&&viewer.scene)viewer.scene.requestRender();\n }\n baseBtn.onclick=()=>{S.on=false;apply();};modelBtn.onclick=()=>{S.on=true;apply();};\n focusBtn.onclick=()=>{if(S.targets.length)viewer.flyTo(S.targets.map(x=>x.entity),{duration:1.5});};\n const watch=setInterval(()=>{try{if(!window.Cesium||typeof viewer===\"undefined\"||!viewer)return;const list=collect(),sig=signature(list);if(list.length&&sig!==S.signature)buildAll(list,sig);enhanceSightLasers();}catch(error){S.building=false;statusEl.textContent=\"오류: \"+String(error&&error.message||error);console.error(\"V58\",error);}},700);\n})();";const frame=document.getElementById("app");frame.addEventListener("load",()=>{const inject=()=>{try{const d=frame.contentDocument;if(!d||!d.body||!d.querySelector("#cesiumContainer"))return setTimeout(inject,250);if(d.getElementById("geo58"))return;const s=d.createElement("script");s.textContent=code;d.body.appendChild(s);}catch(e){console.error("V58 geometry injection failed",e);}};setTimeout(inject,300);});</script></body></html>
