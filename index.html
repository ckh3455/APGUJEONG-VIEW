<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Apgujeong 2 Units 3D Test - v8 Floor Bands</title>
  <script src="https://cesium.com/downloads/cesiumjs/releases/1.121/Build/Cesium/Cesium.js"></script>
  <link href="https://cesium.com/downloads/cesiumjs/releases/1.121/Build/Cesium/Widgets/widgets.css" rel="stylesheet" />
  <style>
    html, body, #cesiumContainer {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      font-family: Arial, "Malgun Gothic", sans-serif;
    }
    .panel {
      position: absolute;
      z-index: 5;
      top: 14px;
      left: 14px;
      width: 360px;
      max-width: calc(100vw - 28px);
      padding: 12px;
      background: rgba(255, 255, 255, 0.94);
      border: 1px solid #d9dee7;
      border-radius: 8px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.18);
      font-size: 13px;
      line-height: 1.45;
    }
    .panel h1 {
      margin: 0 0 8px;
      font-size: 16px;
    }
    .row {
      display: grid;
      gap: 6px;
      margin-top: 8px;
    }
    label {
      font-weight: 700;
    }
    input[type="text"],
    input[type="number"] {
      width: 100%;
      box-sizing: border-box;
      padding: 8px;
      border: 1px solid #c9d0dc;
      border-radius: 6px;
      font-size: 13px;
    }
    input[type="file"] {
      width: 100%;
      font-size: 12px;
    }
    button {
      padding: 8px 10px;
      border: 0;
      border-radius: 6px;
      background: #2563eb;
      color: white;
      font-weight: 700;
      cursor: pointer;
    }
    button.secondary {
      background: #475569;
    }
    .buttons {
      display: flex;
      gap: 8px;
      margin-top: 10px;
    }
    .status {
      margin-top: 8px;
      padding: 8px;
      border-radius: 6px;
      background: #f1f5f9;
      color: #334155;
      white-space: pre-wrap;
    }
    .hint {
      margin-top: 8px;
      color: #64748b;
      font-size: 12px;
    }
    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 8px;
    }
    .legend button {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 5px 8px;
      border: 1px solid #cbd5e1;
      border-radius: 999px;
      background: #ffffff;
      color: #1f2937;
      font-size: 12px;
      font-weight: 700;
    }
    .legend button.active {
      border-color: #111827;
      box-shadow: 0 0 0 2px rgba(17, 24, 39, 0.15);
    }
    .swatch {
      width: 11px;
      height: 11px;
      border: 1px solid rgba(0, 0, 0, 0.25);
      border-radius: 2px;
    }
    .cesium-infoBox {
      width: 500px;
      max-width: 46vw;
    }
    .cesium-infoBox-defaultTable th {
      width: 86px;
      min-width: 86px;
      white-space: nowrap;
      word-break: keep-all;
    }
    .cesium-infoBox-defaultTable td {
      word-break: keep-all;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div id="cesiumContainer"></div>

  <div class="panel">
    <h1>압구정 조망 시뮬레이션</h1>
    <div class="hint">공개용 / 높이별 차폐 원인 표시</div>
    <div class="row">
      <label>평형 범례</label>
      <div class="legend" id="legend"></div>
    </div>
  </div>

  <script>
    Cesium.Ion.defaultAccessToken = "";

    const APGUJEONG_CENTER = Cesium.Cartesian3.fromDegrees(127.03255, 37.52545, 720);
    const statusEl = document.getElementById("status");
    const legendEl = document.getElementById("legend");
    const riverExtendInput = document.getElementById("riverExtendMeters");
    const PUBLIC_VWORLD_KEY = "";

    const viewer = new Cesium.Viewer("cesiumContainer", {
      animation: false,
      timeline: false,
      geocoder: false,
      homeButton: false,
      sceneModePicker: true,
      baseLayerPicker: false,
      navigationHelpButton: false,
      infoBox: true,
      selectionIndicator: true,
      sceneMode: Cesium.SceneMode.SCENE3D,
      imageryProvider: new Cesium.OpenStreetMapImageryProvider({
        url: "https://tile.openstreetmap.org/"
      }),
      terrainProvider: new Cesium.EllipsoidTerrainProvider()
    });

    viewer.scene.globe.depthTestAgainstTerrain = false;
    function enable3DControls() {
      const controller = viewer.scene.screenSpaceCameraController;
      controller.enableInputs = true;
      controller.enableRotate = true;
      controller.enableTilt = true;
      controller.enableTranslate = true;
      controller.enableZoom = true;
      controller.enableLook = true;
      controller.minimumZoomDistance = 20;
      controller.maximumZoomDistance = 6000;
      if (viewer.scene.mode !== Cesium.SceneMode.SCENE3D) {
        viewer.scene.morphTo3D(0);
      }
    }

    function reset3DView() {
      enable3DControls();
      viewer.scene.camera.setView({
        destination: APGUJEONG_CENTER,
        orientation: {
          heading: Cesium.Math.toRadians(335),
          pitch: Cesium.Math.toRadians(-48),
          roll: 0
        }
      });
    }

    reset3DView();

    let unitsDataSource = null;
    let vworldLayer = null;
    const overlayEntities = [];
    const selectedSightEntities = [];
    const riverLineEntities = [];
    let currentFilter = "ALL";
    let footprints = [];
    let riverSegments = [];
    let riverPoints = [];
    let riverLinesForDisplay = [];
    let riverRawGeoJson = null;
    let lastRiverStats = null;
    const viewAnalysisByFid = new Map();

    function setStatus(message) {
      if (statusEl) statusEl.textContent = message;
    }

    function colorFromHex(value, fallback, alpha) {
      const text = String(value || "").trim();
      if (/^#[0-9a-fA-F]{6}$/.test(text)) {
        return Cesium.Color.fromCssColorString(text).withAlpha(alpha);
      }
      if (/^[0-9a-fA-F]{6}$/.test(text)) {
        return Cesium.Color.fromCssColorString("#" + text).withAlpha(alpha);
      }
      return fallback.withAlpha(alpha);
    }

    function cssColorFromHex(value, fallback) {
      const text = String(value || "").trim();
      if (/^#[0-9a-fA-F]{6}$/.test(text)) return text;
      if (/^[0-9a-fA-F]{6}$/.test(text)) return "#" + text;
      return fallback;
    }

    const ORIGIN_LON = 127.03255;
    const ORIGIN_LAT = 37.52545;
    const METERS_PER_DEG_LAT = 110540;
    const METERS_PER_DEG_LON = 111320 * Math.cos(Cesium.Math.toRadians(ORIGIN_LAT));
    const EXTERIOR_HULL_TOLERANCE_M = 8;

    function lonLatToXY(lon, lat) {
      return {
        x: (lon - ORIGIN_LON) * METERS_PER_DEG_LON,
        y: (lat - ORIGIN_LAT) * METERS_PER_DEG_LAT
      };
    }

    function xyToLonLat(point) {
      return {
        lon: point.x / METERS_PER_DEG_LON + ORIGIN_LON,
        lat: point.y / METERS_PER_DEG_LAT + ORIGIN_LAT
      };
    }

    function distance(a, b) {
      return Math.hypot(a.x - b.x, a.y - b.y);
    }

    function vectorLength(v) {
      return Math.hypot(v.x, v.y);
    }

    function dot(a, b) {
      return a.x * b.x + a.y * b.y;
    }

    function bearingTo(from, to) {
      const angle = Cesium.Math.toDegrees(Math.atan2(to.x - from.x, to.y - from.y));
      return (angle + 360) % 360;
    }

    function normalizeAngle(degrees) {
      return ((degrees % 360) + 360) % 360;
    }

    function bearingName(degrees) {
      const names = ["북", "북동", "동", "남동", "남", "남서", "서", "북서"];
      return names[Math.round((((degrees % 360) + 360) % 360) / 45) % 8];
    }

    function closestPointOnSegment(p, a, b) {
      const ab = { x: b.x - a.x, y: b.y - a.y };
      const len2 = ab.x * ab.x + ab.y * ab.y;
      if (len2 === 0) return a;
      const t = Math.max(0, Math.min(1, ((p.x - a.x) * ab.x + (p.y - a.y) * ab.y) / len2));
      return { x: a.x + ab.x * t, y: a.y + ab.y * t };
    }

    function closestPointOnPolyline(p, segments) {
      let best = null;
      for (const segment of segments) {
        const candidate = closestPointOnSegment(p, segment.a, segment.b);
        const d = distance(p, candidate);
        if (!best || d < best.distance) {
          best = { point: candidate, distance: d };
        }
      }
      return best;
    }

    function pointSegmentDistance(point, a, b) {
      return distance(point, closestPointOnSegment(point, a, b));
    }

    function cross(o, a, b) {
      return (a.x - o.x) * (b.y - o.y) - (a.y - o.y) * (b.x - o.x);
    }

    function convexHull(points) {
      const unique = [];
      const seen = new Set();
      for (const point of points) {
        const key = `${point.x.toFixed(3)},${point.y.toFixed(3)}`;
        if (!seen.has(key)) {
          seen.add(key);
          unique.push(point);
        }
      }
      if (unique.length <= 3) return unique;
      unique.sort((a, b) => a.x === b.x ? a.y - b.y : a.x - b.x);
      const lower = [];
      for (const point of unique) {
        while (lower.length >= 2 && cross(lower[lower.length - 2], lower[lower.length - 1], point) <= 0) {
          lower.pop();
        }
        lower.push(point);
      }
      const upper = [];
      for (let i = unique.length - 1; i >= 0; i -= 1) {
        const point = unique[i];
        while (upper.length >= 2 && cross(upper[upper.length - 2], upper[upper.length - 1], point) <= 0) {
          upper.pop();
        }
        upper.push(point);
      }
      lower.pop();
      upper.pop();
      return lower.concat(upper);
    }

    function segmentsFromPoints(points) {
      const segments = [];
      for (let i = 0; i < points.length; i += 1) {
        segments.push({ a: points[i], b: points[(i + 1) % points.length] });
      }
      return segments;
    }

    function distanceToSegments(point, segments) {
      let best = Number.POSITIVE_INFINITY;
      for (const segment of segments || []) {
        best = Math.min(best, pointSegmentDistance(point, segment.a, segment.b));
      }
      return best;
    }

    function polylineLength(points) {
      let total = 0;
      for (let i = 0; i < points.length - 1; i += 1) {
        total += distance(points[i], points[i + 1]);
      }
      return total;
    }

    function extendEndpoint(endpoint, neighbor, meters) {
      const len = distance(endpoint, neighbor);
      if (!Number.isFinite(len) || len === 0 || meters <= 0) return endpoint;
      return {
        x: endpoint.x + ((endpoint.x - neighbor.x) / len) * meters,
        y: endpoint.y + ((endpoint.y - neighbor.y) / len) * meters
      };
    }

    function extendPolyline(points, meters) {
      if (!points || points.length < 2 || !Number.isFinite(meters) || meters <= 0) {
        return points.slice();
      }
      const extended = points.slice();
      extended[0] = extendEndpoint(points[0], points[1], meters);
      extended[extended.length - 1] = extendEndpoint(
        points[points.length - 1],
        points[points.length - 2],
        meters
      );
      return extended;
    }

    function getRiverExtendMeters() {
      if (!riverExtendInput) return 0;
      const value = Number(riverExtendInput.value);
      return Number.isFinite(value) && value > 0 ? value : 0;
    }

    function raySegmentDistance(origin, bearingDeg, a, b) {
      const rad = Cesium.Math.toRadians(bearingDeg);
      const d = { x: Math.sin(rad), y: Math.cos(rad) };
      const v = { x: b.x - a.x, y: b.y - a.y };
      const w = { x: a.x - origin.x, y: a.y - origin.y };
      const cross = d.x * v.y - d.y * v.x;
      if (Math.abs(cross) < 1e-9) return null;
      const t = (w.x * v.y - w.y * v.x) / cross;
      const u = (w.x * d.y - w.y * d.x) / cross;
      if (t >= 0 && u >= 0 && u <= 1) return t;
      return null;
    }

    function ringCentroid(ring) {
      let x = 0;
      let y = 0;
      for (const point of ring) {
        x += point.x;
        y += point.y;
      }
      return { x: x / ring.length, y: y / ring.length };
    }

    function ringSegments(ring) {
      const segments = [];
      for (let i = 0; i < ring.length; i += 1) {
        segments.push({ a: ring[i], b: ring[(i + 1) % ring.length], index: i });
      }
      return segments;
    }

    function pointInRing(point, ring) {
      let inside = false;
      for (let i = 0, j = ring.length - 1; i < ring.length; j = i, i += 1) {
        const pi = ring[i];
        const pj = ring[j];
        const intersects = ((pi.y > point.y) !== (pj.y > point.y)) &&
          (point.x < ((pj.x - pi.x) * (point.y - pi.y)) / (pj.y - pi.y) + pi.x);
        if (intersects) inside = !inside;
      }
      return inside;
    }

    function pointAlongSegment(a, b, t) {
      return {
        x: a.x + (b.x - a.x) * t,
        y: a.y + (b.y - a.y) * t
      };
    }

    function sampleFacadeSegments(footprint, stepMeters = 5) {
      const samples = [];
      for (const segment of footprint.segments) {
        const len = distance(segment.a, segment.b);
        if (!Number.isFinite(len) || len === 0) continue;
        const count = Math.max(1, Math.ceil(len / stepMeters));
        for (let i = 0; i < count; i += 1) {
          const t0 = i / count;
          const t1 = (i + 1) / count;
          samples.push({
            point: pointAlongSegment(segment.a, segment.b, (t0 + t1) / 2),
            a: pointAlongSegment(segment.a, segment.b, t0),
            b: pointAlongSegment(segment.a, segment.b, t1),
            length: len / count,
            segmentIndex: segment.index
          });
        }
      }
      return samples;
    }

    function normalizeRing(coords) {
      const ring = coords.map(([lon, lat]) => lonLatToXY(lon, lat));
      const first = ring[0];
      const last = ring[ring.length - 1];
      if (first && last && first.x === last.x && first.y === last.y) {
        ring.pop();
      }
      return ring;
    }

    function prepareFootprints(geojson) {
      footprints = [];
      if (!geojson || !geojson.features) return;
      const dongPointGroups = new Map();
      for (const feature of geojson.features) {
        const geometry = feature.geometry;
        const props = feature.properties || {};
        if (!geometry) continue;
        const rings = [];
        if (geometry.type === "Polygon") {
          rings.push(normalizeRing(geometry.coordinates[0]));
        } else if (geometry.type === "MultiPolygon") {
          for (const polygon of geometry.coordinates) {
            rings.push(normalizeRing(polygon[0]));
          }
        }
        for (const ring of rings) {
          const footprint = {
            fid: props.fid,
            dong: props.dong,
            unitType: String(props.unit_type || "").trim(),
            floors: Number(props.floors || 0),
            piloti: Number(props.piloti_m || 0),
            floorH: Number(props.floor_h || 3.3),
            height: Number(props.height_m || 0),
            ring,
            center: ringCentroid(ring),
            segments: ringSegments(ring)
          };
          footprints.push(footprint);

          const dongKey = String(props.dong || "");
          if (!dongPointGroups.has(dongKey)) dongPointGroups.set(dongKey, []);
          dongPointGroups.get(dongKey).push(...ring);
        }
      }

      const dongHullSegments = new Map();
      for (const [dongKey, points] of dongPointGroups.entries()) {
        const hull = convexHull(points);
        dongHullSegments.set(dongKey, segmentsFromPoints(hull));
      }

      for (const footprint of footprints) {
        const group = dongPointGroups.get(String(footprint.dong || "")) || footprint.ring;
        footprint.groupCenter = ringCentroid(group);
        footprint.groupHullSegments = dongHullSegments.get(String(footprint.dong || "")) || footprint.segments;
      }
    }

    function prepareRiverSegments(geojson, extendMeters = 0) {
      riverSegments = [];
      riverPoints = [];
      riverLinesForDisplay = [];
      let sourceLength = 0;
      let analysisLength = 0;
      let lineCount = 0;
      if (!geojson || !geojson.features) return;
      for (const feature of geojson.features) {
        const geometry = feature.geometry;
        if (!geometry) continue;
        const lines = geometry.type === "LineString" ? [geometry.coordinates] : geometry.coordinates || [];
        for (const line of lines) {
          const sourcePoints = line.map(([lon, lat]) => lonLatToXY(lon, lat));
          if (sourcePoints.length < 2) continue;
          const points = extendPolyline(sourcePoints, extendMeters);
          lineCount += 1;
          sourceLength += polylineLength(sourcePoints);
          analysisLength += polylineLength(points);
          riverLinesForDisplay.push(points.map(xyToLonLat));
          riverPoints.push(...points);
          for (let i = 0; i < points.length - 1; i += 1) {
            const segment = { a: points[i], b: points[i + 1] };
            riverSegments.push(segment);
            const segmentLength = distance(segment.a, segment.b);
            const samples = Math.max(1, Math.floor(segmentLength / 25));
            for (let j = 1; j < samples; j += 1) {
              const t = j / samples;
              riverPoints.push({
                x: segment.a.x + (segment.b.x - segment.a.x) * t,
                y: segment.a.y + (segment.b.y - segment.a.y) * t
              });
            }
          }
        }
      }
      return {
        lineCount,
        segmentCount: riverSegments.length,
        pointCount: riverPoints.length,
        sourceLength,
        analysisLength,
        extendMeters
      };
    }

    function nearestRayHit(origin, bearing, segments) {
      let best = null;
      for (const segment of segments) {
        const t = raySegmentDistance(origin, bearing, segment.a, segment.b);
        if (t !== null && t > 0 && (!best || t < best.distance)) {
          best = { distance: t, segment };
        }
      }
      return best;
    }

    function rayBlockerProfile(origin, bearing, maxDistance, sourceFootprint) {
      let internalBlocked = false;
      const hits = [];

      for (const footprint of footprints) {
        if (String(footprint.fid) === String(sourceFootprint.fid)) continue;
        for (const segment of footprint.segments) {
          const t = raySegmentDistance(origin, bearing, segment.a, segment.b);
          if (t === null || t <= 2 || t >= maxDistance) continue;

          if (String(footprint.dong) === String(sourceFootprint.dong)) {
            internalBlocked = true;
            continue;
          }

          hits.push({
            dong: footprint.dong,
            unitType: footprint.unitType,
            distance: t,
            height: Number(footprint.height || 0),
            floors: Number(footprint.floors || 0)
          });
        }
      }

      hits.sort((a, b) => a.distance - b.distance);
      let maxBlockerHeight = 0;
      const effectiveBlockers = [];
      for (const hit of hits) {
        if (hit.height > maxBlockerHeight) {
          maxBlockerHeight = hit.height;
          effectiveBlockers.push(hit);
        }
      }

      return {
        internalBlocked,
        maxBlockerHeight,
        blockers: effectiveBlockers
      };
    }

    function floorEyeHeight(footprint, floor) {
      const piloti = Number.isFinite(footprint.piloti) ? footprint.piloti : 0;
      const floorH = Number.isFinite(footprint.floorH) && footprint.floorH > 0 ? footprint.floorH : 3.3;
      const raw = piloti + Math.max(0, floor - 0.5) * floorH;
      return footprint.height > 0 ? Math.min(raw, footprint.height + 1.5) : raw;
    }

    function viewRayLeavesBuilding(samplePoint, targetPoint, footprint) {
      const d = distance(samplePoint, targetPoint);
      if (!Number.isFinite(d) || d === 0) return false;
      const testPoint = {
        x: samplePoint.x + ((targetPoint.x - samplePoint.x) / d) * 0.8,
        y: samplePoint.y + ((targetPoint.y - samplePoint.y) / d) * 0.8
      };
      if (pointInRing(testPoint, footprint.ring)) return false;

      return distanceToSegments(samplePoint, footprint.groupHullSegments) <= EXTERIOR_HULL_TOLERANCE_M;
    }

    function addRayToCollections(ray, openByDirection, openRaysByDirection, allOpenRays) {
      const directionName = bearingName(ray.angle);
      allOpenRays.push(ray);
      if (!openRaysByDirection[directionName]) openRaysByDirection[directionName] = [];
      openRaysByDirection[directionName].push(ray);
      if (!openByDirection[directionName]) openByDirection[directionName] = [];
      openByDirection[directionName].push(ray);
    }

    function collectFacadeCandidates(footprint) {
      const samples = sampleFacadeSegments(footprint, 5);
      const blockers = new Map();
      const candidates = [];

      for (const sample of samples) {
        for (const target of riverPoints) {
          if (!viewRayLeavesBuilding(sample.point, target, footprint)) continue;
          const exactAngle = bearingTo(sample.point, target);
          const angle = normalizeAngle(Math.round(exactAngle));
          const targetDistance = distance(sample.point, target);
          const blockerProfile = rayBlockerProfile(sample.point, exactAngle, targetDistance, footprint);
          if (blockerProfile.internalBlocked) continue;

          for (const blocker of blockerProfile.blockers) {
            const key = `${blocker.dong}동`;
            const current = blockers.get(key);
            if (!current || blocker.distance < current.distance) blockers.set(key, blocker);
          }

          candidates.push({
            angle,
            distance: targetDistance,
            origin: sample.point,
            end: target,
            blockerHeight: blockerProfile.maxBlockerHeight,
            blockers: blockerProfile.blockers,
            sample
          });
        }
      }

      return {
        samples,
        candidates,
        blockers: [...blockers.values()].sort((a, b) => a.distance - b.distance)
      };
    }

    function summarizeFacadeCandidates(footprint, candidateData, observerHeight) {
      const openByDirection = {};
      const openRaysByDirection = {};
      const allOpenRays = [];
      const potentialAngles = new Set();
      const visibleFacadeSegments = [];
      const visibleSamples = new Set();
      const blockingFloorSet = new Set();
      let visibleFacadeLength = 0;
      let visibleSampleCount = 0;

      for (const candidate of candidateData.candidates) {
        potentialAngles.add(candidate.angle);
        if (candidate.blockerHeight >= observerHeight) {
          for (const blocker of candidate.blockers || []) {
            if (blocker.height >= observerHeight && blocker.floors > 0) {
              blockingFloorSet.add(Math.round(blocker.floors));
            }
          }
          continue;
        }

        const ray = {
          angle: candidate.angle,
          order: candidate.angle,
          distance: candidate.distance,
          origin: candidate.origin,
          end: candidate.end
        };
        addRayToCollections(ray, openByDirection, openRaysByDirection, allOpenRays);

        if (!visibleSamples.has(candidate.sample)) {
          visibleSamples.add(candidate.sample);
          visibleSampleCount += 1;
          visibleFacadeLength += candidate.sample.length;
          visibleFacadeSegments.push({
            a: candidate.sample.a,
            b: candidate.sample.b
          });
        }
      }

      const directionSummaries = {};
      for (const [directionName, rays] of Object.entries(openByDirection)) {
        directionSummaries[directionName] = summarizeOpenGaps(rays.sort((a, b) => a.order - b.order));
      }

      const potentialRays = [...potentialAngles]
        .sort((a, b) => a - b)
        .map(angle => ({ angle, order: angle, distance: 0 }));
      const targetSummary = summarizeOpenGaps(potentialRays);
      const allOpenSummary = summarizeOpenGaps(allOpenRays.sort((a, b) => a.order - b.order));

      return {
        openByDirection: directionSummaries,
        openRaysByDirection,
        allOpenSummary,
        allOpenRays,
        totalOpen: allOpenSummary.total,
        targetSpan: targetSummary.total,
        observerHeight,
        visibleFacadeLength,
        visibleFacadeSegments,
        visibleSampleCount,
        sampleCount: candidateData.samples.length,
        blockingFloors: [...blockingFloorSet].sort((a, b) => a - b),
        blockers: candidateData.blockers
      };
    }

    function buildFloorBands(footprint, candidateData) {
      const floorCount = Math.max(1, Math.round(footprint.floors || 1));
      const bands = [];
      let previous = null;

      for (let floor = 1; floor <= floorCount; floor += 1) {
        const summary = summarizeFacadeCandidates(footprint, candidateData, floorEyeHeight(footprint, floor));
        const comparable = {
          totalOpen: summary.totalOpen,
          blockingFloors: summary.blockingFloors.join(",")
        };

        if (!previous) {
          previous = { start: floor, end: floor, comparable, summary };
          continue;
        }

        const same =
          comparable.totalOpen === previous.comparable.totalOpen &&
          comparable.blockingFloors === previous.comparable.blockingFloors;

        if (same) {
          previous.end = floor;
        } else {
          bands.push(previous);
          previous = { start: floor, end: floor, comparable, summary };
        }
      }

      if (previous) bands.push(previous);
      return bands;
    }

    function clearSelectedSightLines() {
      while (selectedSightEntities.length) {
        viewer.entities.remove(selectedSightEntities.pop());
      }
    }

    function largestGap(summary) {
      if (!summary || !summary.gaps || !summary.gaps.length) return null;
      return summary.gaps
        .slice()
        .sort((a, b) => b.size - a.size)[0];
    }

    function formatAngleRange(summary) {
      const gap = largestGap(summary);
      if (!gap) return "없음";
      return `${Math.round(gap.start.angle)}도 ~ ${Math.round(gap.end.angle)}도 (${gap.size}도)`;
    }

    function angleWithinGap(angle, gap) {
      if (!gap) return false;
      const start = normalizeAngle(gap.start.angle);
      const end = normalizeAngle(gap.end.angle);
      const value = normalizeAngle(angle);
      return start <= end ? value >= start && value <= end : value >= start || value <= end;
    }

    function representativeRayForGap(analysis, gap) {
      const rays = (analysis.allOpenRays || [])
        .filter(ray => angleWithinGap(ray.angle, gap))
        .sort((a, b) => a.distance - b.distance);
      if (!rays.length) return null;
      return rays[Math.floor(rays.length / 2)];
    }

    function rayEndFromOrigin(origin, angle, fallbackDistance) {
      const hit = nearestRayHit(origin, angle, riverSegments);
      const d = hit && Number.isFinite(hit.distance) ? hit.distance : fallbackDistance;
      const rad = Cesium.Math.toRadians(angle);
      return {
        x: origin.x + Math.sin(rad) * d,
        y: origin.y + Math.cos(rad) * d
      };
    }

    function summarizeOpenGaps(openRays) {
      if (!openRays.length) {
        return { total: 0, gapCount: 0, maxGap: 0, gaps: [] };
      }
      const buildGap = (start, end, rays) => {
        const distances = rays.map(ray => ray.distance).filter(value => Number.isFinite(value));
        const distanceMin = distances.length ? Math.min(...distances) : 0;
        const distanceMax = distances.length ? Math.max(...distances) : 0;
        const distanceAvg = distances.length
          ? distances.reduce((sum, value) => sum + value, 0) / distances.length
          : 0;
        return {
          start,
          end,
          size: Math.round(end.order - start.order + 1),
          distanceMin,
          distanceMax,
          distanceAvg
        };
      };
      const gaps = [];
      let start = openRays[0];
      let prev = openRays[0];
      let currentRays = [openRays[0]];
      for (let i = 1; i < openRays.length; i += 1) {
        const ray = openRays[i];
        const diff = ((ray.order - prev.order) + 360) % 360;
        if (diff <= 1.01) {
          currentRays.push(ray);
          prev = ray;
        } else {
          gaps.push(buildGap(start, prev, currentRays));
          start = ray;
          prev = ray;
          currentRays = [ray];
        }
      }
      gaps.push(buildGap(start, prev, currentRays));
      if (
        gaps.length > 1 &&
        gaps[0].start.order === 0 &&
        gaps[gaps.length - 1].end.order === 359
      ) {
        const first = gaps.shift();
        const last = gaps.pop();
        gaps.unshift({
          start: last.start,
          end: first.end,
          size: last.size + first.size,
          distanceMin: Math.min(last.distanceMin, first.distanceMin),
          distanceMax: Math.max(last.distanceMax, first.distanceMax),
          distanceAvg: (last.distanceAvg + first.distanceAvg) / 2
        });
      }
      const total = gaps.reduce((sum, gap) => sum + gap.size, 0);
      const maxGap = gaps.reduce((max, gap) => Math.max(max, gap.size), 0);
      return { total, gapCount: gaps.length, maxGap, gaps };
    }

    function angularScanForRiver(origin) {
      const bearings = riverPoints
        .map(point => bearingTo(origin, point))
        .filter(value => Number.isFinite(value))
        .sort((a, b) => a - b);
      if (!bearings.length) return { angles: [], targetSpan: 0, start: null, end: null };
      if (bearings.length === 1) {
        const angle = Math.round(bearings[0]);
        return { angles: [angle], targetSpan: 1, start: angle, end: angle };
      }

      let largestGap = -1;
      let gapIndex = 0;
      for (let i = 0; i < bearings.length; i += 1) {
        const current = bearings[i];
        const next = bearings[(i + 1) % bearings.length] + (i === bearings.length - 1 ? 360 : 0);
        const gap = next - current;
        if (gap > largestGap) {
          largestGap = gap;
          gapIndex = i;
        }
      }

      const start = bearings[(gapIndex + 1) % bearings.length];
      const end = bearings[gapIndex];
      const span = Math.max(0, 360 - largestGap);
      const angles = [];
      const seen = new Set();
      for (let offset = 0; offset <= span; offset += 1) {
        const angle = (Math.round(start + offset) + 360) % 360;
        if (!seen.has(angle)) {
          seen.add(angle);
          angles.push(angle);
        }
      }
      return { angles, targetSpan: Math.round(span), start, end };
    }

    function analyzeViews() {
      viewAnalysisByFid.clear();
      if (!riverSegments.length || !footprints.length) return;
      const allRiverSegments = riverSegments;

      for (const footprint of footprints) {
        const closest = closestPointOnPolyline(footprint.center, allRiverSegments);
        const direction = closest ? bearingTo(footprint.center, closest.point) : null;
        const candidateData = collectFacadeCandidates(footprint);
        const floorBands = buildFloorBands(footprint, candidateData);
        const displayFloor = Math.max(1, Math.round(footprint.floors || 1));
        const facadeView = summarizeFacadeCandidates(
          footprint,
          candidateData,
          floorEyeHeight(footprint, displayFloor)
        );
        const totalOpen = facadeView.totalOpen;
        const grade = totalOpen >= 60 ? "전면 조망" :
          totalOpen >= 30 ? "양호한 부분 조망" :
          totalOpen >= 10 ? "틈새 조망" :
          facadeView.visibleFacadeLength > 0 ? "제한적 조망" : "차폐";

        viewAnalysisByFid.set(String(footprint.fid), {
          riverDistance: closest ? closest.distance : null,
          riverBearing: direction,
          riverBearingName: direction === null ? "" : bearingName(direction),
          targetSpan: facadeView.targetSpan,
          openByDirection: facadeView.openByDirection,
          openRaysByDirection: facadeView.openRaysByDirection,
          allOpenSummary: facadeView.allOpenSummary,
          allOpenRays: facadeView.allOpenRays,
          totalOpen,
          visibleFacadeLength: facadeView.visibleFacadeLength,
          visibleFacadeSegments: facadeView.visibleFacadeSegments,
          visibleSampleCount: facadeView.visibleSampleCount,
          sampleCount: facadeView.sampleCount,
          floorBands,
          displayFloor,
          displayEyeHeight: facadeView.observerHeight,
          blockers: facadeView.blockers.slice(0, 3),
          grade
        });
      }
    }

    function clearOutlines() {
      while (overlayEntities.length) {
        viewer.entities.remove(overlayEntities.pop());
      }
    }

    function clearRiverLines() {
      while (riverLineEntities.length) {
        viewer.entities.remove(riverLineEntities.pop());
      }
    }

    function drawRiverLines() {
      clearRiverLines();
      for (const line of riverLinesForDisplay) {
        if (!line || line.length < 2) continue;
        const degrees = [];
        for (const point of line) {
          degrees.push(point.lon, point.lat, 3);
        }
        riverLineEntities.push(viewer.entities.add({
          name: "조망 계산용 한강라인",
          polyline: {
            positions: Cesium.Cartesian3.fromDegreesArrayHeights(degrees),
            width: 5,
            material: Cesium.Color.fromCssColorString("#00d4ff").withAlpha(0.9),
            clampToGround: false
          }
        }));
      }
    }

    function addSharpOutlineAndLabel(entity, height, labelText, unitType) {
      const hierarchy = entity.polygon.hierarchy && entity.polygon.hierarchy.getValue(Cesium.JulianDate.now());
      if (!hierarchy || !hierarchy.positions) return;

      const outlineColor = Cesium.Color.fromCssColorString("#2f343a").withAlpha(0.95);
      const positions = hierarchy.positions.concat([hierarchy.positions[0]]);
      const topDegrees = [];
      let lonSum = 0;
      let latSum = 0;
      for (const position of positions) {
        const cartographic = Cesium.Cartographic.fromCartesian(position);
        const lon = Cesium.Math.toDegrees(cartographic.longitude);
        const lat = Cesium.Math.toDegrees(cartographic.latitude);
        topDegrees.push(lon);
        topDegrees.push(lat);
        topDegrees.push(height);
      }
      for (const position of hierarchy.positions) {
        const cartographic = Cesium.Cartographic.fromCartesian(position);
        lonSum += Cesium.Math.toDegrees(cartographic.longitude);
        latSum += Cesium.Math.toDegrees(cartographic.latitude);
      }
      const centerLon = lonSum / hierarchy.positions.length;
      const centerLat = latSum / hierarchy.positions.length;

      const bottomOutline = viewer.entities.add({
        name: `${entity.name} 외곽선`,
        unitType,
        polyline: {
          positions,
          width: 1,
          material: outlineColor,
          clampToGround: false
        }
      });
      overlayEntities.push(bottomOutline);

      const topOutline = viewer.entities.add({
        name: `${entity.name} 상단 외곽선`,
        unitType,
        polyline: {
          positions: Cesium.Cartesian3.fromDegreesArrayHeights(topDegrees),
          width: 1,
          material: outlineColor,
          clampToGround: false
        }
      });
      overlayEntities.push(topOutline);

      const groundPositions = hierarchy.positions;
      for (let i = 0; i < groundPositions.length; i += 1) {
        const cartographic = Cesium.Cartographic.fromCartesian(groundPositions[i]);
        const lon = Cesium.Math.toDegrees(cartographic.longitude);
        const lat = Cesium.Math.toDegrees(cartographic.latitude);
        const sideOutline = viewer.entities.add({
          unitType,
          polyline: {
            positions: Cesium.Cartesian3.fromDegreesArrayHeights([
              lon, lat, 0,
              lon, lat, height
            ]),
            width: 1,
            material: outlineColor,
              clampToGround: false
            }
        });
        overlayEntities.push(sideOutline);
      }

      if (labelText) {
        const labelEntity = viewer.entities.add({
          name: `${entity.name} 라벨`,
          unitType,
          position: Cesium.Cartesian3.fromDegrees(centerLon, centerLat, height + 2),
          label: {
            text: labelText,
            font: "bold 15px Arial, Malgun Gothic, sans-serif",
            fillColor: Cesium.Color.fromCssColorString("#111827"),
            outlineColor: Cesium.Color.WHITE,
            outlineWidth: 3,
            style: Cesium.LabelStyle.FILL_AND_OUTLINE,
            horizontalOrigin: Cesium.HorizontalOrigin.CENTER,
            verticalOrigin: Cesium.VerticalOrigin.CENTER,
            disableDepthTestDistance: Number.POSITIVE_INFINITY,
            pixelOffset: new Cesium.Cartesian2(0, 0),
            scaleByDistance: new Cesium.NearFarScalar(250, 1.15, 3000, 0.45)
          }
        });
        overlayEntities.push(labelEntity);
      }
    }

    function setOverlayVisible(unitType, visible) {
      for (const overlay of overlayEntities) {
        if (overlay.unitType === unitType) overlay.show = visible;
      }
    }

    function applyUnitFilter(unitType) {
      currentFilter = unitType;
      if (!unitsDataSource) return;

      for (const entity of unitsDataSource.entities.values) {
        if (!entity.polygon) continue;
        const selected = unitType === "ALL" || entity.unitType === unitType;
        const opacity = selected ? 1 : 0.16;
        entity.show = true;
        entity.polygon.material = entity.baseColor.withAlpha(opacity);
      }

      for (const overlay of overlayEntities) {
        const selected = unitType === "ALL" || overlay.unitType === unitType;
        overlay.show = selected;
      }

      for (const button of legendEl.querySelectorAll("button")) {
        button.classList.toggle("active", button.dataset.unitType === unitType);
      }
    }

    function buildLegend(items) {
      legendEl.innerHTML = "";
      const allButton = document.createElement("button");
      allButton.type = "button";
      allButton.dataset.unitType = "ALL";
      allButton.className = "active";
      allButton.textContent = "전체";
      allButton.addEventListener("click", () => applyUnitFilter("ALL"));
      legendEl.appendChild(allButton);

      for (const item of items) {
        const button = document.createElement("button");
        button.type = "button";
        button.dataset.unitType = item.unitType;
        button.innerHTML = `<span class="swatch" style="background:${item.color}"></span>${item.unitType}PY`;
        button.addEventListener("click", () => applyUnitFilter(item.unitType));
        legendEl.appendChild(button);
      }
    }

    function drawSelectedSightLines(entity) {
      clearSelectedSightLines();
      if (!entity || !entity.fidValue) return;
      const analysis = viewAnalysisByFid.get(String(entity.fidValue));
      if (!analysis || !entity.positionForSight) return;

      const baseHeight = entity.positionForSight.height + 5;
      const facadeColor = Cesium.Color.fromCssColorString("#16a34a").withAlpha(0.98);

      for (const segment of analysis.visibleFacadeSegments || []) {
        const a = xyToLonLat(segment.a);
        const b = xyToLonLat(segment.b);
        selectedSightEntities.push(viewer.entities.add({
          name: `${entity.name} 조망 가능 외곽선`,
          polyline: {
            positions: Cesium.Cartesian3.fromDegreesArrayHeights([
              a.lon, a.lat, baseHeight,
              b.lon, b.lat, baseHeight
            ]),
            width: 7,
            material: facadeColor,
            clampToGround: false
          }
        }));
      }
    }

    function formatDistanceRange(rays) {
      if (!rays || !rays.length) return "0 m";
      const distances = rays.map(ray => ray.distance).filter(value => Number.isFinite(value));
      if (!distances.length) return "0 m";
      const min = Math.round(Math.min(...distances));
      const max = Math.round(Math.max(...distances));
      const avg = Math.round(distances.reduce((sum, value) => sum + value, 0) / distances.length);
      return min === max ? `${min} m` : `${min}~${max} m (평균 ${avg} m)`;
    }

    function formatOpenGapDetails(summary) {
      if (!summary || !summary.gaps || !summary.gaps.length) return "없음";
      return summary.gaps
        .slice()
        .sort((a, b) => a.start.order - b.start.order)
        .map(gap => {
          const start = Math.round(gap.start.angle);
          const end = Math.round(gap.end.angle);
          const min = Math.round(gap.distanceMin);
          const max = Math.round(gap.distanceMax);
          const distanceText = min === max ? `${min}m` : `${min}~${max}m`;
          return `${start}~${end}도 ${gap.size}도 / ${distanceText}`;
        })
        .join(" · ");
    }

    function formatDirectionSummary(analysis) {
      if (!analysis) return "계산 전";
      const order = ["서", "북서", "북", "북동", "동", "남동", "남", "남서"];
      const entries = Object.entries(analysis.openByDirection || {})
        .filter(([, summary]) => summary && summary.total > 0)
        .sort(([a], [b]) => {
          const ai = order.indexOf(a);
          const bi = order.indexOf(b);
          return (ai === -1 ? 99 : ai) - (bi === -1 ? 99 : bi);
        })
        .map(([name, summary]) => `${name} ${summary.total}도`);
      return entries.length ? entries.join(" / ") : "0도";
    }

    function formatFloorBands(analysis) {
      if (!analysis || !analysis.floorBands || !analysis.floorBands.length) return "계산 전";
      const floorCount = analysis.displayFloor;
      const bands = analysis.floorBands;
      if (bands.length === 1) {
        const only = bands[0];
        return `층별 변화 없음 (전층 ${only.summary.totalOpen}도)`;
      }
      return bands
        .map(band => {
          const angle = band.summary.totalOpen;
          const blockers = (band.summary.blockingFloors || [])
            .filter(floor => floor > 0)
            .map(floor => `${floor}층`)
            .join("·");
          const blockerText = blockers ? `(${blockers} 차폐)` : "";
          if (band.start === 1 && band.end < floorCount) return `${band.end}층 이하 ${angle}도${blockerText}`;
          if (band.end === floorCount && band.start > 1) return `${band.start}층부터 ${angle}도${blockerText}`;
          if (band.start === 1 && band.end === floorCount) return `전층 ${angle}도${blockerText}`;
          if (band.start === band.end) return `${band.start}층 ${angle}도${blockerText}`;
          return `${band.start}~${band.end}층 ${angle}도${blockerText}`;
        })
        .join(" / ");
    }

    function buildDescription(props) {
      const analysis = viewAnalysisByFid.get(String(props.fid));
      const rows = [
        ["동", props.dong],
        ["타입", props.unit_type],
        ["층수", props.floors],
        ["기준각", analysis ? `${analysis.displayFloor}층 기준 ${analysis.totalOpen}도` : "계산 전"],
        ["각도범위", analysis ? formatAngleRange(analysis.allOpenSummary) : "계산 전"],
        ["층별 변화", analysis ? formatFloorBands(analysis) : "계산 전"]
      ];
      return `
        <table class="cesium-infoBox-defaultTable">
          <tbody>
            ${rows.map(([k, v]) => `<tr><th>${k}</th><td>${v ?? ""}</td></tr>`).join("")}
          </tbody>
        </table>
      `;
    }

    function propsFromEntity(entity) {
      const props = {};
      const propertyNames = entity.properties ? entity.properties.propertyNames : [];
      for (const name of propertyNames) {
        props[name] = entity.properties[name].getValue(Cesium.JulianDate.now());
      }
      return props;
    }

    function refreshLoadedDescriptions() {
      if (!unitsDataSource) return;
      for (const entity of unitsDataSource.entities.values) {
        if (!entity.polygon) continue;
        entity.description = buildDescription(propsFromEntity(entity));
      }
    }

    function riverStatusText() {
      if (!lastRiverStats) return "한강라인: 미로드";
      return [
        `한강라인: ${lastRiverStats.lineCount}개`,
        `원본 길이: ${Math.round(lastRiverStats.sourceLength)} m`,
        `계산 길이: ${Math.round(lastRiverStats.analysisLength)} m`,
        `끝단 확장: ${Math.round(lastRiverStats.extendMeters)} m`,
        `스캔점: ${lastRiverStats.pointCount}개`
      ].join("\n");
    }

    function recalculateViews(message = "조망 계산 갱신 완료") {
      if (!riverRawGeoJson) {
        setStatus("한강라인 GeoJSON이 아직 로드되지 않았습니다.");
        return;
      }
      lastRiverStats = prepareRiverSegments(riverRawGeoJson, getRiverExtendMeters());
      drawRiverLines();
      analyzeViews();
      refreshLoadedDescriptions();
      setStatus(`${message}\n${riverStatusText()}\n유닛 수: ${footprints.length}`);
      if (viewer.selectedEntity) {
        drawSelectedSightLines(viewer.selectedEntity);
      }
    }

    async function loadGeoJson(input) {
      if (unitsDataSource) {
        viewer.dataSources.remove(unitsDataSource, true);
        unitsDataSource = null;
      }
      clearOutlines();
      prepareFootprints(input);
      analyzeViews();

      const source = await Cesium.GeoJsonDataSource.load(input, {
        clampToGround: false,
        stroke: Cesium.Color.TRANSPARENT,
        fill: Cesium.Color.RED,
        strokeWidth: 0
      });

      const entities = source.entities.values;
      let validCount = 0;
      let maxHeight = 0;
      const legendMap = new Map();

      for (const entity of entities) {
        if (!entity.polygon) continue;

        const props = propsFromEntity(entity);

        const height = Number(props.height_m || props.height || 0);
        const finalHeight = Number.isFinite(height) && height > 0 ? height : 20;
        const fill = colorFromHex(props.fill_color, Cesium.Color.RED, 1);
        const unitType = String(props.unit_type || "").trim();
        const typeLabel = unitType ? `${unitType}PY` : "";
        const cssColor = cssColorFromHex(props.fill_color, "#ef4444");

        entity.name = `${props.dong || ""}동 ${props.unit_type || ""}`;
        entity.fidValue = props.fid;
        entity.unitType = unitType;
        entity.baseColor = fill;
        const matchingFootprint = footprints.find(f => String(f.fid) === String(props.fid));
        entity.positionForSight = matchingFootprint ? {
          xy: matchingFootprint.center,
          height: finalHeight
        } : null;
        entity.description = buildDescription(props);
        entity.polygon.height = 0;
        entity.polygon.extrudedHeight = finalHeight;
        entity.polygon.material = fill;
        entity.polygon.outline = false;
        entity.polygon.shadows = Cesium.ShadowMode.DISABLED;
        entity.polygon.closeTop = true;
        entity.polygon.closeBottom = true;
        addSharpOutlineAndLabel(entity, finalHeight, typeLabel, unitType);
        if (unitType && !legendMap.has(unitType)) {
          legendMap.set(unitType, { unitType, color: cssColor });
        }

        validCount += 1;
        maxHeight = Math.max(maxHeight, finalHeight);
      }

      unitsDataSource = source;
      await viewer.dataSources.add(source);
      buildLegend([...legendMap.values()].sort((a, b) => Number.parseFloat(a.unitType) - Number.parseFloat(b.unitType)));
      applyUnitFilter(currentFilter);
      await viewer.zoomTo(source, new Cesium.HeadingPitchRange(
        Cesium.Math.toRadians(335),
        Cesium.Math.toRadians(-45),
        900
      ));

      setStatus(`GeoJSON 로드 완료\n유닛 수: ${validCount}\n최대 높이: ${maxHeight.toFixed(1)} m\n${riverStatusText()}`);
    }

    async function loadDefaultGeoJson() {
      try {
        const response = await fetch("apgujeong_2_units.geojson", { cache: "no-store" });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const data = await response.json();
        await loadGeoJson(data);
      } catch (error) {
        setStatus(
          "자동 로드 실패: apgujeong_2_units.geojson을 같은 폴더에 넣었는지 확인하세요.\n" +
          "또는 아래 파일 선택으로 직접 불러오세요.\n" +
          `오류: ${error.message}`
        );
      }
    }

    async function loadRiverLine() {
      try {
        const response = await fetch("hangang_line_zone2.geojson", { cache: "no-store" });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const data = await response.json();
        riverRawGeoJson = data;
        recalculateViews("기본 한강라인 로드 완료");
      } catch (error) {
        setStatus(`한강 라인 로드 실패: ${error.message}`);
      }
    }

    function applyVworldBaseMap() {
      const key = PUBLIC_VWORLD_KEY.trim();
      if (!key) {
        setStatus("V-World 공개용 키가 없어 OSM 배경을 사용합니다.");
        return;
      }

      if (vworldLayer) {
        viewer.imageryLayers.remove(vworldLayer, true);
      }

      const provider = new Cesium.UrlTemplateImageryProvider({
        url: `https://api.vworld.kr/req/wmts/1.0.0/${key}/Satellite/{z}/{y}/{x}.jpeg`,
        minimumLevel: 6,
        maximumLevel: 19,
        tilingScheme: new Cesium.WebMercatorTilingScheme(),
        credit: "V-World"
      });

      vworldLayer = viewer.imageryLayers.addImageryProvider(provider);
      viewer.imageryLayers.lowerToBottom(vworldLayer);
      setStatus("V-World 위성 배경 적용 시도 완료.");
    }

    const geojsonFileInput = document.getElementById("geojsonFile");
    if (geojsonFileInput) {
      geojsonFileInput.addEventListener("change", async (event) => {
        const file = event.target.files && event.target.files[0];
        if (!file) return;
        try {
          const text = await file.text();
          const data = JSON.parse(text);
          await loadGeoJson(data);
        } catch (error) {
          setStatus(`수동 파일 로드 실패: ${error.message}`);
        }
      });
    }

    const riverFileInput = document.getElementById("riverFile");
    if (riverFileInput) {
      riverFileInput.addEventListener("change", async (event) => {
        const file = event.target.files && event.target.files[0];
        if (!file) return;
        try {
          const text = await file.text();
          riverRawGeoJson = JSON.parse(text);
          recalculateViews("수동 한강라인 로드 완료");
        } catch (error) {
          setStatus(`한강라인 수동 로드 실패: ${error.message}`);
        }
      });
    }

    const recalculateButton = document.getElementById("recalculateViews");
    if (recalculateButton) {
      recalculateButton.addEventListener("click", () => {
        recalculateViews("조망 계산 갱신 완료");
      });
    }

    if (riverExtendInput) {
      riverExtendInput.addEventListener("change", () => {
        recalculateViews("한강라인 확장값 반영 완료");
      });
    }

    viewer.selectedEntityChanged.addEventListener((entity) => {
      drawSelectedSightLines(entity);
    });

    setTimeout(applyVworldBaseMap, 300);

    loadRiverLine().then(loadDefaultGeoJson);
  </script>
</body>
</html>
