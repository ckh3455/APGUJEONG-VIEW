<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>압구정 조망 시뮬레이션</title>
  <style>
    html, body { width: 100%; height: 100%; margin: 0; }
    body { display: grid; place-items: center; font-family: Arial, "Malgun Gothic", sans-serif; background: #f8fafc; color: #334155; }
    #bootMessage { padding: 18px 22px; border: 1px solid #dbe3ef; border-radius: 10px; background: #fff; box-shadow: 0 8px 24px rgba(15,23,42,.10); font-size: 14px; font-weight: 700; }
    #bootMessage.error { color: #b91c1c; white-space: pre-wrap; }
  </style>
</head>
<body>
  <div id="bootMessage">압구정 조망 시뮬레이션 v47을 불러오는 중입니다.</div>

  <script type="text/plain" id="collectFacadePatch">
    function collectFacadeCandidates(footprint) {
      const samples = sampleFacadeSegments(footprint, FACADE_SAMPLE_STEP_M);
      const blockers = new Map();
      const candidates = [];
      const commonContexts = commonRiverContextsForAngleGrid();
      const commonPoints = commonRiverPointsForAngleGrid(commonContexts);

      for (const sample of samples) {
        const scan = angularScanForRiver(sample.point, commonPoints);
        for (const angle of scan.angles) {
          let activeHit = null;
          let commonBlockerDistance = 0;

          for (const item of commonContexts) {
            const hit = nearestRayHit(sample.point, angle, item.context.segments);
            if (!hit || !Number.isFinite(hit.distance) || hit.distance <= 2) continue;
            commonBlockerDistance = Math.max(commonBlockerDistance, hit.distance);
            if (item.mode === currentRiverMode) activeHit = hit;
          }

          if (!activeHit) {
            const fallbackHit = nearestRayHit(sample.point, angle, activeRiverSegments);
            if (fallbackHit && Number.isFinite(fallbackHit.distance) && fallbackHit.distance > 2) {
              activeHit = fallbackHit;
              commonBlockerDistance = Math.max(commonBlockerDistance, fallbackHit.distance);
            }
          }
          if (!activeHit) continue;

          const rad = Cesium.Math.toRadians(angle);
          const target = {
            x: sample.point.x + Math.sin(rad) * activeHit.distance,
            y: sample.point.y + Math.cos(rad) * activeHit.distance
          };
          if (!viewRayLeavesBuilding(sample.point, target, footprint)) continue;

          const blockerProfile = rayBlockerProfile(
            sample.point,
            angle,
            commonBlockerDistance || activeHit.distance,
            footprint
          );
          if (blockerProfile.internalBlocked) continue;

          for (const blocker of blockerProfile.blockers) {
            const key = `${blocker.zoneName || ""}:${blocker.dong}동`;
            const current = blockers.get(key);
            if (!current || blocker.distance < current.distance) blockers.set(key, blocker);
          }

          candidates.push({
            angle,
            distance: activeHit.distance,
            origin: sample.point,
            end: target,
            blockerHeight: blockerProfile.maxBlockerHeight,
            blockers: blockerProfile.blockers,
            sample
          });
        }
      }

      return {
        samples,
        candidates,
        angleProfiles: buildAngleProfiles(candidates),
        blockers: [...blockers.values()].sort((a, b) => a.distance - b.distance)
      };
    }
  </script>

  <script type="text/plain" id="angleScanPatch">
    function commonRiverContextsForAngleGrid() {
      const contexts = [];
      for (const mode of Object.keys(RIVER_MODE_CONFIGS)) {
        const state = preparedRiverStateByMode.get(mode);
        if (!state || !state.context || !state.context.segments || !state.context.segments.length) continue;
        contexts.push({ mode, context: state.context });
      }
      if (!contexts.length) {
        contexts.push({
          mode: currentRiverMode,
          context: { segments: activeRiverSegments, points: activeRiverPoints }
        });
      }
      return contexts;
    }

    function commonRiverPointsForAngleGrid(contexts = commonRiverContextsForAngleGrid()) {
      const points = [];
      const seen = new Set();
      for (const item of contexts) {
        for (const point of item.context.points || []) {
          const key = `${Math.round(point.x * 10)}:${Math.round(point.y * 10)}`;
          if (seen.has(key)) continue;
          seen.add(key);
          points.push(point);
        }
      }
      return points.length ? points : activeRiverPoints;
    }

    function angularScanForRiver(origin, scanPoints = commonRiverPointsForAngleGrid()) {
      const bearings = scanPoints
        .map(point => bearingTo(origin, point))
        .filter(value => Number.isFinite(value))
        .sort((a, b) => a - b);
      if (!bearings.length) return { angles: [], targetSpan: 0, start: null, end: null };
      if (bearings.length === 1) {
        const angle = normalizeAngle(Math.round(bearings[0]));
        return { angles: [angle], targetSpan: 1, start: angle, end: angle };
      }

      let largestGap = -1;
      let gapIndex = 0;
      for (let i = 0; i < bearings.length; i += 1) {
        const current = bearings[i];
        const next = bearings[(i + 1) % bearings.length] + (i === bearings.length - 1 ? 360 : 0);
        const gap = next - current;
        if (gap > largestGap) {
          largestGap = gap;
          gapIndex = i;
        }
      }

      const start = bearings[(gapIndex + 1) % bearings.length];
      const end = bearings[gapIndex];
      const span = Math.max(0, 360 - largestGap);
      const angles = [];
      const seen = new Set();
      for (let offset = 0; offset <= span; offset += 1) {
        const angle = normalizeAngle(Math.round(start + offset));
        if (!seen.has(angle)) {
          seen.add(angle);
          angles.push(angle);
        }
      }
      return { angles, targetSpan: Math.round(span), start, end };
    }
  </script>

  <script type="text/plain" id="runZonePatch">
    async function runZoneAnalysis(zoneId, options = {}) {
      const generation = Number.isFinite(Number(options.generation))
        ? Number(options.generation)
        : zoneLoadGeneration;
      if (generation !== zoneLoadGeneration) return false;

      const normalizedZoneId = normalizeZoneId(zoneId);
      const cacheKey = normalizedZoneId || "ALL";
      const force = !!options.force;
      if (!force && calculatedZones.has(cacheKey)) return true;
      if (!riverSegments.length || !footprints.length) return false;

      const targetFootprints = targetFootprintsForZone(cacheKey);
      const label = zoneLabelForStatus(cacheKey);
      if (!targetFootprints.length) {
        if (generation === zoneLoadGeneration) setStatus(`${label} 계산 대상 유닛이 없습니다.`);
        return false;
      }

      const startMs = performance.now();
      let completed = 0;
      let analyzed = 0;
      setStatus(`${label} 조망 계산 중...\n유닛 폴리곤: 0/${targetFootprints.length}`);

      for (const footprint of targetFootprints) {
        if (generation !== zoneLoadGeneration) return false;
        if (storeViewAnalysisForFootprint(footprint)) analyzed += 1;
        completed += 1;
        if (generation !== zoneLoadGeneration) return false;
        if (completed % 2 === 0 || completed === targetFootprints.length) {
          setStatus(`${label} 조망 계산 중...\n유닛 폴리곤: ${completed}/${targetFootprints.length}`);
          await new Promise(resolve => requestAnimationFrame(resolve));
        }
      }

      if (generation !== zoneLoadGeneration) return false;
      activeRiverSegments = riverSegments;
      activeRiverPoints = riverPoints;
      calculatedZones.add(cacheKey);
      refreshLoadedDescriptions();
      const seconds = ((performance.now() - startMs) / 1000).toFixed(1);
      setStatus(`${label} 조망 계산 완료\n계산 대상: 유닛 폴리곤 ${targetFootprints.length}개\n계산 완료: ${analyzed}개\n소요: ${seconds}초`);
      return true;
    }
  </script>

  <script type="text/plain" id="prepareBothPatch">
    async function prepareBothRiverModeAnalyses(zoneId = currentZoneId, generation = zoneLoadGeneration) {
      const zoneIds = currentLoadedZoneIds();
      const analysisKey = `${normalizeZoneId(zoneId) || "ALL"}|${zoneIds.join(",")}|${generation}`;
      if (riverModesAnalysisPromise && riverModesAnalysisZoneKey === analysisKey) {
        return riverModesAnalysisPromise;
      }

      const originalMode = currentRiverMode;
      riverModesReady = false;
      setRiverModeButtonsDisabled(true);
      updateRiverModeNote();

      const promise = (async () => {
        await preloadRiverModeFiles();
        if (generation !== zoneLoadGeneration) return false;

        viewAnalysisCacheByMode.clear();
        for (const mode of Object.keys(RIVER_MODE_CONFIGS)) {
          preparedRiverState(mode, zoneIds);
        }

        let modeIndex = 0;
        for (const mode of Object.keys(RIVER_MODE_CONFIGS)) {
          if (generation !== zoneLoadGeneration) return false;
          modeIndex += 1;
          activatePreparedRiverMode(mode, { zoneIds, draw: false });
          resetViewAnalysisCache();
          setStatus(`${zoneLabelForStatus(zoneId)} 두 기준 일괄 계산 중 (${modeIndex}/2)\n현재: ${activeRiverConfig().label}`);
          const completed = await analyzeViewsForZone(zoneId, { force: true, generation });
          if (!completed || generation !== zoneLoadGeneration) return false;
          saveAnalysisCacheForMode(mode);
        }

        if (generation !== zoneLoadGeneration) return false;
        activatePreparedRiverMode(originalMode, { zoneIds, draw: true });
        restoreAnalysisCacheForMode(originalMode);
        riverModesReady = true;
        setRiverModeButtonsDisabled(false);
        updateRiverModeNote();
        setStatus(`${zoneLabelForStatus(zoneId)} 보수적·완화적 두 기준 계산 완료\n한강라인 버튼은 재계산 없이 저장 결과만 전환합니다.\n현재 기준: ${activeRiverConfig().label}`);
        return true;
      })();

      riverModesAnalysisPromise = promise;
      riverModesAnalysisZoneKey = analysisKey;

      try {
        return await promise;
      } finally {
        if (riverModesAnalysisPromise === promise) {
          riverModesAnalysisPromise = null;
          riverModesAnalysisZoneKey = null;
        }
      }
    }
  </script>

  <script type="text/plain" id="switchModePatch">
    async function switchRiverMode(mode) {
      if (!RIVER_MODE_CONFIGS[mode]) return;

      if (!riverModesReady && riverModesAnalysisPromise) {
        setStatus(`${zoneLabelForStatus(currentZoneId)} 보수적·완화적 계산을 함께 진행 중입니다.\n완료 후 자동으로 전환합니다.`);
        await riverModesAnalysisPromise;
      }

      if (!riverModesReady || !viewAnalysisCacheByMode.has(mode)) {
        setStatus(`${zoneLabelForStatus(currentZoneId)}의 두 기준 계산 결과가 아직 준비되지 않았습니다.\n한강라인 버튼에서는 재계산하지 않습니다.`);
        return;
      }

      if (mode === currentRiverMode) {
        setActiveRiverButton(mode);
        updateRiverModeNote();
        return;
      }

      const selectedEntity = viewer.selectedEntity;
      try {
        activatePreparedRiverMode(mode, { zoneIds: currentLoadedZoneIds(), draw: true });
        restoreAnalysisCacheForMode(mode);
        if (selectedEntity) {
          drawSelectedSightLines(selectedEntity);
          updateSelectionDetails(selectedEntity);
        }
        updateFloorTotalAngle(selectedEntity);
        setStatus(`${activeRiverConfig().label} 저장 결과로 즉시 전환했습니다.`);
      } catch (error) {
        setStatus(`${activeRiverConfig().label} 전환 실패: ${error.message}`);
      }
    }
  </script>

  <script type="text/plain" id="loadZonePatch">
    async function loadZone(zoneId) {
      const generation = ++zoneLoadGeneration;
      const config = ZONE_CONFIGS[zoneId] || ZONE_CONFIGS["2"];
      currentZoneId = zoneId;
      setActiveZoneButton(zoneId);

      riverModesReady = false;
      riverModesAnalysisPromise = null;
      riverModesAnalysisZoneKey = null;
      viewAnalysisCacheByMode.clear();
      calculatedZones.clear();
      calculatingZonePromises.clear();
      zoneCalculationQueue = Promise.resolve();
      setRiverModeButtonsDisabled(true);
      updateRiverModeNote();
      setStatus(`${config.label} 데이터와 두 한강라인을 동시에 불러오는 중입니다.`);

      try {
        const zoneIds = config.zoneIds ? config.zoneIds.slice() : [zoneId];
        const riverFilesPromise = preloadRiverModeFiles();
        const unitsPromise = config.zoneIds
          ? Promise.all(
              zoneIds.map(async id => ({
                zoneId: id,
                data: await fetchGeoJson(ZONE_CONFIGS[id].unitsUrl)
              }))
            ).then(combineFeatureCollections)
          : fetchGeoJson(config.unitsUrl).then(data =>
              combineFeatureCollections([{ zoneId, data }])
            );

        const [, unitsData] = await Promise.all([riverFilesPromise, unitsPromise]);
        if (generation !== zoneLoadGeneration) return;

        preparedRiverStateByMode.clear();
        activatePreparedRiverMode(currentRiverMode, { zoneIds, draw: true });
        await loadGeoJson(unitsData, config.label);
        if (generation !== zoneLoadGeneration) return;

        await prepareBothRiverModeAnalyses(zoneId, generation);
      } catch (error) {
        if (generation !== zoneLoadGeneration) return;
        riverModesReady = false;
        setRiverModeButtonsDisabled(false);
        updateRiverModeNote();
        setStatus(`${config.label} 로드 실패: ${error.message}`);
      }
    }
  </script>

  <script>
    (() => {
      const BASE_FILE = "./index_v44_base.html?v=20260711-47";
      const message = document.getElementById("bootMessage");

      function replaceOnce(source, before, after, label) {
        const index = source.indexOf(before);
        if (index < 0) throw new Error(`${label} 수정 위치를 찾지 못했습니다.`);
        return source.slice(0, index) + after + source.slice(index + before.length);
      }

      function replaceBlock(source, startMarker, endMarker, replacement, label) {
        const start = source.indexOf(startMarker);
        const end = source.indexOf(endMarker, start + startMarker.length);
        if (start < 0 || end < 0 || end <= start) throw new Error(`${label} 함수 범위를 찾지 못했습니다.`);
        return source.slice(0, start) + replacement + "\n\n" + source.slice(end);
      }

      async function boot() {
        const response = await fetch(BASE_FILE, { cache: "no-store" });
        if (!response.ok) throw new Error(`기본 앱 로드 실패: HTTP ${response.status}`);
        let source = await response.text();

        source = replaceOnce(
          source,
          '<div class="hint">버전: v44 · 업데이트: 2026.07.11 / <strong>정밀도면이 아닙니다</strong></div>',
          '<div class="hint">버전: v47 · 업데이트: 2026.07.11 / <strong>정밀도면이 아닙니다</strong></div>',
          "버전"
        );
        source = replaceOnce(
          source,
          'const DATA_VERSION = "v44-dual-river-preload-20260711";',
          'const DATA_VERSION = "v47-zone-cancel-20260711";',
          "데이터 버전"
        );

        const noteOld = '? `두 한강라인 계산 완료 · 현재 기준: ${activeRiverConfig().label}`\n        : `보수적·완화적 한강라인 동시 준비 중 · 현재 기준: ${activeRiverConfig().label}`;';
        const noteNew = '? `현재 구역 두 기준 계산 완료 · 버튼은 저장 결과 전환 · 현재 기준: ${activeRiverConfig().label}`\n        : `현재 구역 보수적·완화적 기준을 함께 계산 중 · 현재 기준: ${activeRiverConfig().label}`;';
        if (source.includes(noteOld)) source = source.replace(noteOld, noteNew);

        source = replaceOnce(
          source,
          '    let riverModesAnalysisPromise = null;\n    let riverModesReady = false;',
          '    let riverModesAnalysisPromise = null;\n    let riverModesAnalysisZoneKey = null;\n    let zoneLoadGeneration = 0;\n    let riverModesReady = false;',
          "구역 전환 취소 상태"
        );

        const collectPatch = document.getElementById("collectFacadePatch").textContent.replace(/^\n/, "").trimEnd();
        const anglePatch = document.getElementById("angleScanPatch").textContent.replace(/^\n/, "").trimEnd();
        const runZonePatch = document.getElementById("runZonePatch").textContent.replace(/^\n/, "").trimEnd();
        const prepareBothPatch = document.getElementById("prepareBothPatch").textContent.replace(/^\n/, "").trimEnd();
        const switchPatch = document.getElementById("switchModePatch").textContent.replace(/^\n/, "").trimEnd();
        const loadZonePatch = document.getElementById("loadZonePatch").textContent.replace(/^\n/, "").trimEnd();

        source = replaceBlock(source, "    function collectFacadeCandidates(footprint) {", "    function summarizeFacadeCandidates", collectPatch, "공통 레이 계산");
        source = replaceBlock(source, "    function angularScanForRiver(origin) {", "    function normalizeZoneId", anglePatch, "공통 각도망");
        source = replaceBlock(source, "    async function runZoneAnalysis(zoneId, options = {}) {", "    function analyzeViewsForZone", runZonePatch, "구역 계산 취소");
        source = replaceBlock(source, "    async function prepareBothRiverModeAnalyses(zoneId = currentZoneId) {", "    function applyPublicBaseMap", prepareBothPatch, "두 기준 일괄 계산");
        source = replaceBlock(source, "    async function switchRiverMode(mode) {", "    async function recalculateViews", switchPatch, "한강라인 저장 결과 전환");
        source = replaceBlock(source, "    async function loadZone(zoneId) {", "    function applyVworldBaseMap", loadZonePatch, "구역 로드 취소");

        const entityCalcOld = [
          '      if (!viewAnalysisByFid.has(fid)) {',
          '        setStatus(`${zoneLabelForStatus(zoneId)} 조망 계산을 시작합니다.`);',
          '        await analyzeViewsForZone(zoneId);',
          '      }'
        ].join("\n");
        const entityCalcNew = [
          '      if (!viewAnalysisByFid.has(fid)) {',
          '        setStatus(`${zoneLabelForStatus(zoneId)} 보수적·완화적 일괄 계산 완료를 기다리는 중입니다.`);',
          '        if (riverModesAnalysisPromise) await riverModesAnalysisPromise;',
          '        if (!viewAnalysisByFid.has(fid)) return;',
          '      }'
        ].join("\n");
        source = replaceOnce(source, entityCalcOld, entityCalcNew, "유닛 클릭 재계산 방지");

        document.open();
        document.write(source);
        document.close();
      }

      boot().catch(error => {
        console.error(error);
        message.classList.add("error");
        message.textContent = `앱 수정본을 불러오지 못했습니다.\n${error.message}`;
      });
    })();
  </script>
</body>
</html>
