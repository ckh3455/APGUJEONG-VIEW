<!doctype html>
<html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>압구정 조망 시뮬레이션 V56 프리미엄</title>
<style>html,body,#app{width:100%;height:100%;margin:0;overflow:hidden;background:#0b1526}#app{border:0;display:block}</style>
</head><body>
<iframe id="app" title="압구정 조망 시뮬레이션" src="./index_v55_zone_cache_light.html?v=20260711-55"></iframe>
<script>
const premiumRuntime="\n(() => {\n  if(window.__APG_PREMIUM_VISUAL__) return;\n  window.__APG_PREMIUM_VISUAL__=true;\n  const S={premium:true,water:[],scene:null,layers:[],osm:null};\n  const css=document.createElement(\"style\");\n  css.textContent=\"#pv56{position:fixed;z-index:99999;right:14px;top:14px;width:220px;padding:12px;border:1px solid rgba(247,202,123,.76);border-radius:14px;background:linear-gradient(135deg,rgba(8,18,38,.95),rgba(57,29,35,.92));box-shadow:0 12px 34px rgba(0,0,0,.4);backdrop-filter:blur(12px);font:12px Arial,'Malgun Gothic',sans-serif;color:#fff}#pv56 b{display:block;color:#f4c777;font-size:14px;margin-bottom:9px}#pv56 .r{display:grid;grid-template-columns:1fr 1fr;gap:6px}#pv56 button{padding:8px 4px;border:1px solid rgba(255,255,255,.28);border-radius:9px;background:rgba(255,255,255,.08);color:#e5e7eb;font-weight:700;cursor:pointer}#pv56 button.on{background:linear-gradient(135deg,#d99b45,#f5d08b);color:#172033;border-color:#ffe2a8}#pv56 small{display:block;margin-top:8px;line-height:1.4;color:#cbd5e1}\";\n  document.head.appendChild(css);\n  const box=document.createElement(\"div\");\n  box.id=\"pv56\";\n  box.innerHTML='<b>V56 프리미엄 조망</b><div class=\"r\"><button id=\"pvB\">기본 분석</button><button id=\"pvP\" class=\"on\">프리미엄</button></div><small>조망 계산·배치 데이터는 그대로 두고 유리 질감과 한강 분위기만 강화합니다.</small>';\n  document.body.appendChild(box);\n  const b=box.querySelector(\"#pvB\"),p=box.querySelector(\"#pvP\");\n\n  function ready(){return window.Cesium&&typeof viewer!==\"undefined\";}\n  function glass(c){\n    const t=Cesium.Color.fromCssColorString(\"#173a58\");\n    const x=Cesium.Color.lerp(c||Cesium.Color.SLATEGRAY,t,.38,new Cesium.Color());\n    x.alpha=.91; return x;\n  }\n  function save(){\n    S.scene={hdr:viewer.scene.highDynamicRange,light:viewer.scene.globe.enableLighting,bg:viewer.scene.backgroundColor,shadow:viewer.shadows,fxaa:viewer.scene.postProcessStages.fxaa?.enabled,bloom:viewer.scene.postProcessStages.bloom?.enabled};\n    for(let i=0;i<viewer.imageryLayers.length;i++){const l=viewer.imageryLayers.get(i);S.layers.push({l,b:l.brightness,c:l.contrast,s:l.saturation,g:l.gamma});}\n  }\n  function units(){\n    if(typeof unitsDataSource===\"undefined\"||!unitsDataSource)return;\n    for(const e of unitsDataSource.entities.values){\n      if(!e.polygon)continue;\n      if(!e._pvBase)e._pvBase=e.baseColor||Cesium.Color.SLATEGRAY;\n      if(e._pvShadow===undefined)e._pvShadow=e.polygon.shadows;\n      e.baseColor=S.premium?glass(e._pvBase):e._pvBase;\n      const show=currentFilter===\"ALL\"||e.unitType===currentFilter;\n      e.polygon.material=e.baseColor.withAlpha(show?(S.premium?.91:1):.055);\n      e.polygon.shadows=S.premium?Cesium.ShadowMode.ENABLED:(e._pvShadow||Cesium.ShadowMode.DISABLED);\n    }\n  }\n  function outlines(){\n    if(typeof overlayEntities===\"undefined\")return;\n    for(const e of overlayEntities){\n      if(!e.polyline)continue;\n      if(!e._pvMat)e._pvMat=e.polyline.material;\n      if(e._pvWidth===undefined)e._pvWidth=e.polyline.width;\n      if(S.premium){\n        e.polyline.width=1.35;\n        e.polyline.material=new Cesium.PolylineGlowMaterialProperty({color:Cesium.Color.fromCssColorString(\"#e7b869\").withAlpha(.58),glowPower:.025});\n      }else{e.polyline.width=e._pvWidth;e.polyline.material=e._pvMat;}\n    }\n  }\n  function river(){\n    if(typeof riverLineEntities!==\"undefined\")for(const e of riverLineEntities){\n      if(!e.polyline)continue;\n      if(!e._pvRiverMat)e._pvRiverMat=e.polyline.material;\n      if(e._pvRiverWidth===undefined)e._pvRiverWidth=e.polyline.width;\n      if(S.premium){e.polyline.width=6;e.polyline.material=new Cesium.PolylineGlowMaterialProperty({color:Cesium.Color.fromCssColorString(\"#72d3e7\").withAlpha(.9),glowPower:.25});}\n      else{e.polyline.width=e._pvRiverWidth;e.polyline.material=e._pvRiverMat;}\n    }\n  }\n  function water(){\n    if(!S.premium||S.water.length||typeof riverLinesForDisplay===\"undefined\")return;\n    for(const line of riverLinesForDisplay){\n      if(!line||line.length<2)continue;\n      const d=[];for(const q of line)d.push(q.lon,q.lat,2.5);\n      const pos=Cesium.Cartesian3.fromDegreesArrayHeights(d);\n      S.water.push(viewer.entities.add({name:\"프리미엄 한강 수면\",polyline:{positions:pos,width:18,material:new Cesium.PolylineGlowMaterialProperty({color:Cesium.Color.fromCssColorString(\"#4eb6d8\").withAlpha(.42),glowPower:.34,taperPower:.6})}}));\n      S.water.push(viewer.entities.add({name:\"프리미엄 석양 반사\",polyline:{positions:pos,width:4,material:new Cesium.PolylineGlowMaterialProperty({color:Cesium.Color.fromCssColorString(\"#f2b875\").withAlpha(.58),glowPower:.22})}}));\n    }\n  }\n  function clearWater(){while(S.water.length)viewer.entities.remove(S.water.pop());}\n  function scene(){\n    if(S.premium){\n      viewer.scene.highDynamicRange=true;viewer.scene.globe.enableLighting=true;viewer.shadows=true;\n      viewer.scene.backgroundColor=Cesium.Color.fromCssColorString(\"#806d82\");\n      if(viewer.scene.postProcessStages.fxaa)viewer.scene.postProcessStages.fxaa.enabled=true;\n      const bloom=viewer.scene.postProcessStages.bloom;if(bloom){bloom.enabled=false;if(bloom.uniforms){bloom.uniforms.glowOnly=false;bloom.uniforms.contrast=96;bloom.uniforms.brightness=-.18;bloom.uniforms.delta=1;bloom.uniforms.sigma=2.2;bloom.uniforms.stepSize=1;}}\n      if(viewer.scene.skyAtmosphere){viewer.scene.skyAtmosphere.hueShift=-.035;viewer.scene.skyAtmosphere.saturationShift=.18;viewer.scene.skyAtmosphere.brightnessShift=-.06;}\n      if(viewer.scene.fog){viewer.scene.fog.enabled=true;viewer.scene.fog.density=.00018;viewer.scene.fog.minimumBrightness=.28;}\n      for(let i=0;i<viewer.imageryLayers.length;i++){const l=viewer.imageryLayers.get(i);l.brightness=.70;l.contrast=1.06;l.saturation=.76;l.gamma=.88;}\n      if(typeof osmBuildingsTileset!==\"undefined\"&&osmBuildingsTileset){if(!S.osm)S.osm=osmBuildingsTileset.style;osmBuildingsTileset.style=new Cesium.Cesium3DTileStyle({color:\"color('#aab4c2',0.96)\",show:true});}\n    }else{\n      viewer.scene.highDynamicRange=S.scene.hdr;viewer.scene.globe.enableLighting=S.scene.light;viewer.shadows=S.scene.shadow;viewer.scene.backgroundColor=S.scene.bg;\n      if(viewer.scene.postProcessStages.fxaa)viewer.scene.postProcessStages.fxaa.enabled=S.scene.fxaa;\n      if(viewer.scene.postProcessStages.bloom)viewer.scene.postProcessStages.bloom.enabled=!!S.scene.bloom;\n      for(const x of S.layers){x.l.brightness=x.b;x.l.contrast=x.c;x.l.saturation=x.s;x.l.gamma=x.g;}\n      if(typeof osmBuildingsTileset!==\"undefined\"&&osmBuildingsTileset&&S.osm)osmBuildingsTileset.style=S.osm;\n    }\n  }\n  function apply(){\n    if(!ready())return;\n    scene();units();outlines();river();if(S.premium)water();else clearWater();viewer.scene.requestRender();\n  }\n  function mode(v){S.premium=v;b.classList.toggle(\"on\",!v);p.classList.toggle(\"on\",v);apply();}\n  b.onclick=()=>mode(false);p.onclick=()=>mode(true);\n  const wait=setInterval(()=>{if(!ready())return;clearInterval(wait);save();mode(true);setInterval(()=>{units();outlines();river();if(S.premium)water();},1400);},150);\n})();";
const frame=document.getElementById("app");
frame.addEventListener("load",()=>{
  const inject=()=>{
    try{
      const doc=frame.contentDocument;
      if(!doc||!doc.body||!doc.querySelector('#cesiumContainer'))return setTimeout(inject,250);
      if(doc.getElementById("pv56"))return;
      const script=doc.createElement("script");
      script.textContent=premiumRuntime;
      doc.body.appendChild(script);
    }catch(error){console.error("V56 premium injection failed",error);}
  };
  setTimeout(inject,300);
});
</script></body></html>
