imageryLayers.get(i);S.layers.push({l,b:l.brightness,c:l.contrast,s:l.saturation,g:l.gamma});}\n }\n function metal(c){const silver=Cesium.Color.fromCssColorString(\"#c8cdd1\");const x=Cesium.Color.lerp(c||Cesium.Color.SLATEGRAY,silver,.14,new Cesium.Color());x.alpha=1;return x;}\n function units(){\n  if(typeof unitsDataSource===\"undefined\"||!unitsDataSource)return;\n  for(const e of unitsDataSource.entities.values){\n   if(!e.polygon)continue;\n   if(!e._alBase)e._alBase=e.baseColor||Cesium.Color.SLATEGRAY;\n   if(e._alShadow===undefined)e._alShadow=e.polygon.shadows;\n   e.baseColor=S.on?metal(e._alBase):e._alBase;\n   const visible=currentFilter===\"ALL\"||e.unitType===currentFilter;\n   e.polygon.material=e.baseColor.withAlpha(visible?1:.05);\n   e.polygon.shadows=S.on?Cesium.ShadowMode.DISABLED:(e._alShadow||Cesium.ShadowMode.DISABLED);\n  }\n }\n function lines(){\n  if(typeof overlayEntities===\"undefined\")return;\n  for(const e of overlayEntities){\n   if(!e.polyline)continue;\n   if(!e._alMat)e._alMat=e.polyline.material;\n   if(e._alWidth===undefined)e._alWidth=e.polyline.width;\n   if(S.on){e.polyline.width=1.6;e.polyline.material=Cesium.Color.fromCssColorString(\"#3f4852\").withAlpha(.98);}\n   else{e.polyline.width=e._alWidth;e.polyline.material=e._alMat;}\n  }\n }\n function river(){\n  if(typeof riverLineEntities===\"undefined\")return;\n  for(const e of riverLineEntities){\n   if(!e.polyline)continue;\n   if(!e._alMat)e._alMat=e.polyline.material;\n   if(e._alWidth===undefined)e._alWidth=e.polyline.width;\n   if(S.on){e.polyline.width=5;e.polyline.material=Cesium.Color.fromCssColorString(\"#1683a3\").withAlpha(.9);}\n   else{e.polyline.width=e._alWidth;e.polyline.material=e._alMat;}\n  }\n }\n function scene(){\n  if(S.on){\n   viewer.scene.highDynamicRange=false;viewer.scene.globe.enableLighting=false;viewer.shadows=false;\n   if(viewer.scene.postProcessStages.fxaa)viewer.scene.postProcessStages.fxaa.enabled=true;\n   if(viewer.scene.postProcessStages.bloom)viewer.scene.postProcessStages.bloom.enabled=false;\n   for(const x of S.layers){x.l.brightness=x.b;x.l.contrast=x.c;x.l.saturation=x.s;x.l.gamma=x.g;}\n   if(viewer.scene.fog)viewer.scene.fog.enabled=false;\n   if(typeof osmBuildingsTileset!==\"undefined\"&&osmBuildingsTileset){if(!S.osm)S.osm=osmBuildingsTileset.style;osmBuildingsTileset.style=new Cesium.Cesium3DTileStyle({color:\"color('#d4d7da',1.0)\",show:true});}\n  }else{\n   viewer.scene.highDynamicRange=S.scene.hdr;viewer.scene.globe.enableLighting=S.scene.light;viewer.shadows=S.scene.shadow;\n   if(viewer.scene.postProcessStages.fxaa)viewer.scene.postProcessStages.fxaa.enabled=S.scene.fxaa;\n   if(viewer.scene.postProcessStages.bloom)viewer.scene.postProcessStages.bloom.enabled=!!S.scene.bloom;\n   for(const x of S.layers){x.l.brightness=x.b;x.l.contrast=x.c;x.l.saturation=x.s;x.l.gamma=x.g;}\n   if(typeof osmBuildingsTileset!==\"undefined\"&&osmBuildingsTileset&&S.osm)osmBuildingsTileset.style=S.osm;\n  }\n }\n function apply(){if(!ok())return;scene();units();lines();river();viewer.scene.requestRender();}\n function mode(v){S.on=v;bb.classList.toggle(\"on\",!v);pp.classList.toggle(\"on\",v);apply();}\n bb.onclick=()=>mode(false);pp.onclick=()=>mode(true);\n const w=setInterval(()=>{if(!ok())return;clearInterval(w);save();mode(true);setInterval(()=>{units();lines();river();},1400);},150);\n})();";const frame=document.getElementById("app");frame.addEventListener("load",()=>{const inject=()=>{try{const d=frame.contentDocument;if(!d||!d.body||!d.querySelector("#cesiumContainer"))return setTimeout(inject,250);if(d.getElementById("pv56"))return;const s=d.createElement("script");s.textContent=code;d.body.appendChild(s);}catch(e){console.error("V56 aluminum injection failed",e);}};setTimeout(inject,300);});</script></body></html>
