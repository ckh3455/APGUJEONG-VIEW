<!doctype html>
<html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>압구정 조망 시뮬레이션 V56 프리미엄</title>
<style>html,body,#app{width:100%;height:100%;margin:0;overflow:hidden;background:#0b1526}#app{border:0;display:block}</style>
</head><body>
<iframe id="app" title="압구정 조망 시뮬레이션" src="./index_v55_zone_cache_light.html?v=20260711-55"></iframe>
<script>
const premiumRuntime="\n(() => {\n  if(window.__APG_PREMIUM_VISUAL__) return;\n  window.__APG_PREMIUM_VISUAL__=true;\n  const S={premium:true,water:[],scene:null,layers:[],osm:null};\n  const css=document.createElement(\"style\");\n  css.textContent=\"#pv56{position:fixed;z-index:99999;right:14px;top:14px;width:220px;padding:12px;border:1px solid rgba(247,202,123,.76);border-radius:14px;background:linear-gradient(135deg,rgba(8,18,38,.95),rgba(57,29,35,.92));box-shadow:0 12px 34px rgba(0,0,0,.4);backdrop-filter:blur(12px);font:12px Arial,'Malgun Gothic',sans-serif;color:#fff}#pv56 b{display:block;color:#f4c777;font-size:14px;margin-bottom:9px}#pv56 .r{display:grid;grid-template-columns:1fr 1fr;gap:6px}#pv56 button{padding:8px 4px;border:1px solid rgba(255,255,255,.28);border-radius:9px;background:rgba(255,255,255,.08);color:#e5e7eb;font-weight:700;cursor:pointer}#pv56 button.on{background:linear-gradient(135deg,#d99b45,#f5d08b);color:#172033;border-color:#ffe2a8}#pv56 small{display:block;margin-top:8px;line-height:1.4;color:#cbd5e1}\";\n  document.head.appendChild(css);\n  const box=document.createElement(\"div\");\n  box.id=\"pv56\";\n  box.innerHTML='<b>V56 알루미늄 정오</b><div class=\"r\"><button id=\"pvB\">기본 분석</button><button id=\"pvP\" class=\"on\">알루미늄</button></div><small>조망 계산·배치 데이터는 그대로 두고 불투명 알루미늄 외벽과 선명한 유닛 경계만 적용합니다.</small>';\n  document.body.appendChild(box);\n  const b=box.querySelector(\"#pvB\"),p=box.querySelector(\"#pvP\");\n\n  function ready(){return window.Cesium&&typeof viewer!==\"undefined\";}\n  function glass(c){
    const silver=Cesium.Color.fromCssColorString("#c7cdd2");
    const x=Cesium.Color.lerp(c||Cesium.Color.SLATEGRAY,silver,.16,new Cesium.Color());
    x.alpha=1; return x;
  }
  function save(){\n    S.scene={hdr:viewer.scene.highDynamicRange,light:viewer.scene.globe.enableLighting,bg:viewer.scene.backgroundColor,shadow:viewer.shadows,fxaa:viewer.scene.postProcessStages.fxaa?.enabled,bloom:viewer.scene.postProcessStages.bloom?.enabled};\n    for(let i=0;i<viewer.imageryLayers.length;i++){const l=viewer.imageryLayers.get(i);S.layers.push({l,b:l.brightness,c:l.contrast,s:l.saturation,g:l.gamma});}\n  }\n  function units(){\n    if(typeof unitsDataSource===\"undefined\"||!unitsDataSource)return;\n    for(const e of unitsDataSource.entities.values){\n      if(!e.polygon)continue;\n      if(!e._pvBase)e._pvBase=e.baseColor||Cesium.Color.SLATEGRAY;\n      if(e._pvShadow===undefined)e._pvShadow=e.polygon.shadows;\n      e.baseColor=S.premium?glass(e._pvBase):e._pvBase;\n      const show=currentFilter===\"ALL\"||e.unitType===currentFilter;\n      e.polygon.material=e.baseColor.withAlpha(show?1:.06);\n      e.polygon.shadows=S.premium?Cesium.ShadowMode.DISABLED:(e._pvShadow||Cesium.ShadowMode.DISABLED);\n    }\n  }\n  function outlines(){
    if(typeof overlayEntities==="undefined")return;
    for(const e of overlayEntities){
      if(!e.polyline)continue;
      if(!e._pvMat)e._pvMat=e.polyline.material;
      if(e._pvWidth===undefined)e._pvWidth=e.polyline.width;
      if(S.premium){
        e.polyline.width=1.55;
        e.polyline.material=Cesium.Color.fromCssColorString("#4b5563").withAlpha(.96);
      }else{e.polyline.width=e._pvWidth;e.polyline.material=e._pvMat;}
    }
  }
  function river(){
    if(typeof riverLineEntities==="undefined")return;
    for(const e of riverLineEntities){
      if(!e.polyline)continue;
      if(!e._pvRiverMat)e._pvRiverMat=e.polyline.material;
      if(e._pvRiverWidth===undefined)e._pvRiverWidth=e.polyline.width;
      if(S.premium){
        e.polyline.width=5;
        e.polyline.material=Cesium.Color.fromCssColorString("#1683a3").withAlpha(.9);
      }else{e.polyline.width=e._pvRiverWidth;e.polyline.material=e._pvRiverMat;}
    }
  }
  function water(){ return; }
  function clearWater(){while(S.water.length)viewer.entities.remove(S.water.pop());}\n  function scene(){
    viewer.scene.highDynamicRange=S.premium?false:S.scene.hdr;
    viewer.scene.globe.enableLighting=S.premium?false:S.scene.light;
    viewer.shadows=S.premium?false:S.scene.shadow;
    if(viewer.scene.postProcessStages.fxaa)viewer.scene.postProcessStages.fxaa.enabled=true;
    if(viewer.scene.postProcessStages.bloom)viewer.scene.postProcessStages.bloom.enabled=false;
    if(S.premium){
      for(const x of S.layers){x.l.brightness=x.b;x.l.contrast=x.c;x.l.saturation=x.s;x.l.gamma=x.g;}
      if(viewer.scene.skyAtmosphere){
        viewer.scene.skyAtmosphere.hueShift=0;
        viewer.scene.skyAtmosphere.saturationShift=0;
        viewer.scene.skyAtmosphere.brightnessShift=0;
      }
      if(viewer.scene.fog)viewer.scene.fog.enabled=false;
      if(typeof osmBuildingsTileset!=="undefined"&&osmBuildingsTileset){
        if(!S.osm)S.osm=osmBuildingsTileset.style;
        osmBuildingsTileset.style=new Cesium.Cesium3DTileStyle({color:"color('#d3d6d8',1.0)",show:true});
      }
    }else{
      viewer.scene.backgroundColor=S.scene.bg;
      if(viewer.scene.postProcessStages.fxaa)viewer.scene.postProcessStages.fxaa.enabled=S.scene.fxaa;
      if(viewer.scene.postProcessStages.bloom)viewer.scene.postProcessStages.bloom.enabled=!!S.scene.bloom;
      for(const x of S.layers){x.l.brightness=x.b;x.l.contrast=x.c;x.l.saturation=x.s;x.l.gamma=x.g;}
      if(typeof osmBuildingsTileset!=="undefined"&&osmBuildingsTileset&&S.osm)osmBuildingsTileset.style=S.osm;
    }
    clearWater();
  }
  function apply(){\n    if(!ready())return;\n    scene();units();outlines();river();if(S.premium)water();else clearWater();viewer.scene.requestRender();\n  }\n  function mode(v){S.premium=v;b.classList.toggle(\"on\",!v);p.classList.toggle(\"on\",v);apply();}\n  b.onclick=()=>mode(false);p.onclick=()=>mode(true);\n  const wait=setInterval(()=>{if(!ready())return;clearInterval(wait);save();mode(true);setInterval(()=>{units();outlines();river();if(S.premium)water();},1400);},150);\n})();";
const frame=document.getElementById("app");
frame.addEventListener("load",()=>{
  const inject=()=>{
    try{
      const doc=frame.contentDocument;
      if(!doc||!doc.body||!doc.querySelector('#cesiumContainer'))return setTimeout(inject,250);
      if(doc.getElementById("pv56"))return;
      const script=doc.createElement("script");
      script.textContent=premiumRuntime;
      doc.body.appendChild(script);
    }catch(error){console.error("V56 premium injection failed",error);}
  };
  setTimeout(inject,300);
});
</script></body></html>
